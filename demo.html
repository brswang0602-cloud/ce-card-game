// Helper: compute system damage for a folded player in DJ Fold scenario
// System damage = public cards + their own cover cards + opponent's best hand bonus
function potDetailForFoldSysDamage(foldedPlayer) {
  let sysDmg = 0;
  // Public cards cost
  sysDmg += G.publicCards.filter(pc => !pc.covered).length;
  // Folded player's cover cards cost
  sysDmg += foldedPlayer.coverCards.length;
  // Find the non-folded opponent's hand bonus (evaluate their hand)
  let opponent = G.players.find(p => p !== foldedPlayer && !p.eliminated && !G.foldPlayers.has(G.players.indexOf(p)));
  if (opponent) {
    let available = [
      ...opponent.coverCards,
      ...G.publicCards.filter(pc => !pc.covered || pc.owner === G.players.indexOf(opponent)).map(pc => pc.card)
    ];
    let result = evaluateHand(available);
    sysDmg += result.bonus;
  }
  return sysDmg;
}

async function doAnte() {
  G.phase = 'ante';
  let dealer = G.players[G.dealerIdx];
  
  if (G.stage === 4) {
    // DJ: BOTH players ante, insufficient = immediate elimination
    let alive = G.players.filter(p => !p.eliminated);
    let totalAnte = 0;
    for (let p of alive) {
      if (p.chips < G.ante) {
        // Cannot afford ante → chips go negative → eliminated
        p.chips -= G.ante; // goes negative
        totalAnte += G.ante;
        addLog(`S2 下注：${p.name} 筹码不足！需${G.ante}💰，仅${p.chips + G.ante}💰 → 底注不够直接判负淘汰！💀`, 'danger');
      } else {
        p.chips -= G.ante;
        totalAnte += G.ante;
        addLog(`S2 下注：${p.name} 下注 ${G.ante}💰`, 'info');
      }
    }
    G.pot += totalAnte;
    G.potDetail.ante = totalAnte;
    
    // Check for eliminated players (chips < 0 after ante)
    let newlyEliminated = alive.filter(p => p.chips < 0);
    for (let p of newlyEliminated) {
      p.eliminated = true;
      G.eliminatedOrder.push(p);
      addLog(`${p.name} 底注不足，筹码归负淘汰！💀`, 'danger');
    }
    
    // If only one alive after elimination, game over
    let remaining = G.players.filter(p => !p.eliminated);
    if (remaining.length <= 1) {
      G.gameOver = true;
      renderAll();
      await showGameEnd(remaining[0] || null);
      return 'dj_eliminated';
    }
  } else {
    // Multi-player: dealer only
    if (dealer.chips < G.ante) {
      let actualAnte = dealer.chips;
      dealer.chips = 0;
      G.pot += actualAnte;
      G.potDetail.ante = actualAnte;
      addLog(`S2 下注：${dealer.name}(庄家) 筹码不足！全下 ${actualAnte}💰（需${G.ante}💰）`, 'danger');
    } else {
      dealer.chips -= G.ante;
      G.pot += G.ante;
      G.potDetail.ante = G.ante;
      addLog(`S2 下注：${dealer.name}(庄家) 下注 ${G.ante}💰`, 'info');
    }
  }
  renderAll();
  await delay(600);
  return null;
}

async function doPublicCards() {
  G.phase = 'public';
  // Move non-frozen public cards to discard pile (not silently dropped)
  let removed = G.publicCards.filter(pc => !pc.frozen);
  for (let pc of removed) {
    G.discardPile.push(pc.card);
  }
  G.publicCards = G.publicCards.filter(pc => pc.frozen);
  for (let pc of G.publicCards) pc.frozen = false;
  
  // Number of public cards depends on stage
  let numPub;
  if (G.stage === 4) {
    numPub = 5; // DJ: always 5
  } else {
    numPub = G.stageConfig[G.stage]?.publicPerTurn || 2;
  }
  let newCards = drawFromDeck(numPub);
  for (let c of newCards) {
    G.publicCards.push({card:c, frozen:false, covered:false});
  }
  trimPublicCards(); // P1-#6: enforce limit
  addLog(`S3 翻公共牌：${newCards.map(c=>cardName(c)).join(' ')}`, 'phase');
  
  // Trigger gunner resonance: red cards revealed → richest loses chips
  for (let c of newCards) {
    if (isRed(c)) {
      for (let i = 0; i < G.players.length; i++) {
        if (G.players[i].eliminated) continue;
        triggerGunnerResonance(i, c);
      }
    }
  }
  
  renderAll();
  await delay(800);
}

async function doDrawPhase() {
  G.phase = 'draw';
  addLog('S4 摸牌阶段', 'phase');
  
  let startIdx = (G.dealerIdx + 1) % G.players.length;
  for (let i = 0; i < G.players.length; i++) {
    let idx = (startIdx + i) % G.players.length;
    let p = G.players[idx];
    if (p.eliminated) continue;
    
    // Draw 1 number card
    let numCards = drawFromDeck(1);
    p.hand.push(...numCards);
    
    // Necro L2 resonance bonus: draw 1 extra card if won last showdown with resonance
    if (p._necroResonanceBonus) {
      delete p._necroResonanceBonus;
      let extra = drawFromDeck(1);
      if (extra.length > 0) {
        p.hand.push(...extra);
        addLog(`${p.name}「亡者加护」→ 共鸣奖励多摸1张`, 'result');
      }
    }
    
    // Check passive: expand_bag L2 = draw extra 1 card
    let expandBag = p.passives.find(ps => ps.id === 'expand_bag');
    if (expandBag && expandBag.level >= 2) {
      let extra = drawFromDeck(1);
      if (extra.length > 0) {
        p.hand.push(...extra);
        addLog(`${p.name}「扩容背包L2」→ 多摸1张`, 'info');
      }
    }
    
    // Check passive: fog = cover card to public pool
    if (p.passives.some(ps => ps.id === 'fog')) {
      let coverCard = drawFromDeck(1);
      if (coverCard.length > 0) {
        G.publicCards.push({card:coverCard[0], frozen:false, covered:true, owner:idx});
        addLog(`${p.name}「迷雾降临」→ 1张盖牌入公共池`, 'info');
        trimPublicCards(); // P1-#6: enforce 7 card limit
        triggerWaterPressure('add');
      }
    }
    
    // Draw 1 skill card (biased by school)
    let skill = drawSkillCard(p);
    if (skill) {
      if (p.skills.length < p.skillLimit) {
        p.skills.push(skill);
        if (p.isHuman) {
          addLog(`你获得技能卡「${skill.name}」`, 'info');
        }
      } else if (p.isHuman) {
        // P0-#3: Human must choose which skill to discard
        await new Promise(resolve => {
          let allSkills = [...p.skills, skill]; // existing + new
          let content = `<p>技能卡已满(${p.skillLimit}张)！获得「${skill.name}」，请选择1张弃掉：</p>`;
          content += '<div class="cards-choice">';
          for (let i = 0; i < allSkills.length; i++) {
            let s = allSkills[i];
            let isNew = i === allSkills.length - 1;
            content += `<div class="choice-card" id="skill-discard-${i}" onclick="selectSkillDiscard(${i})">
              <div class="card-name">${s.name}${isNew?' 🆕':''}</div>
              <div class="card-desc">${s.type==='trap'?'陷阱':'主动'} | ${s.cost}💰 | ${s.desc}</div>
            </div>`;
          }
          content += '</div>';
          showModal('🎴 技能卡已满，请弃牌', content, [
            {text:'确认弃牌', cls:'btn-primary', action:() => {
              let sel = document.querySelector('.choice-card.selected');
              if (!sel) return;
              let discardIdx = parseInt(sel.id.split('-')[2]);
              // Keep all except the discarded one
              let keepSkills = allSkills.filter((_, j) => j !== discardIdx);
              p.skills = keepSkills;
              let discarded = allSkills[discardIdx];
              G.skillDiscardPile.push(discarded);
              G.usedSkills.delete(discarded.id);
              addLog(`技能卡已满，你弃掉了「${discarded.name}」`, 'action');
              closeModal();
              resolve();
            }}
            ]);
        });
      } else {
        // AI: discard lowest value skill
        let discardIdx = p.skills.findIndex(s => s.type === 'trap') ;
        if (discardIdx < 0) discardIdx = 0;
        addLog(`${p.name} 技能卡已满，弃掉「${p.skills[discardIdx].name}」，获得「${skill.name}」`, 'action');
        let removed = p.skills.splice(discardIdx, 1)[0];
        G.skillDiscardPile.push(removed);
        G.usedSkills.delete(removed.id);
        p.skills.push(skill);
      }
    }
    
    // Enforce hand + skill limits after drawing
    await enforceHandLimit(idx);
    
    G.currentActorIdx = idx;
    renderAll();
    await delay(400);
  }
}

function drawSkillCard(player) {
  // Biased draw: if player has school passive, 50% chance of school skill
  // Uniqueness: each skill card can only exist once (held or in discard pile)
  let availablePool = SKILL_POOL.filter(s => !G.usedSkills.has(s.id));
  
  // If pool is empty, reshuffle skill discard pile back
  if (availablePool.length === 0 && G.skillDiscardPile.length > 0) {
    let reshuffled = G.skillDiscardPile.length;
    for (let s of G.skillDiscardPile) {
      G.usedSkills.delete(s.id);
    }
    G.skillDiscardPile = [];
    addLog(`🔄 技能卡弃牌堆${reshuffled}张洗回技能卡库！`, 'phase');
  }
  
  // Re-check after reshuffle
  availablePool = SKILL_POOL.filter(s => !G.usedSkills.has(s.id));
  if (availablePool.length === 0) return null; // truly empty
  
  let pool;
  if (player.school && Math.random() < 0.5) {
    pool = availablePool.filter(s => s.school === player.school);
  }
  if (!pool || pool.length === 0) {
    pool = availablePool;
  }
  let chosen = pool[Math.floor(Math.random() * pool.length)];
  G.usedSkills.add(chosen.id); // mark as in-use
  return {...chosen};
}

// ========== HAND/SKILL LIMIT ENFORCEMENT ==========

// After any card addition, enforce hand/skill limits
async function enforceHandLimit(playerIdx) {
  let p = G.players[playerIdx];
  
  // Safety: snapshot limits at entry (they should not change during enforcement)
  let maxSkills = p.skillLimit;
  let maxHand = p.handLimit;
  
  // Enforce skill limit
  while (p.skills.length > maxSkills) {
    if (p.isHuman) {
      await new Promise(resolve => {
        let content = `<p>技能卡超出上限(${maxSkills}张)！当前${p.skills.length}张，请选择1张弃掉：</p>`;
        content += '<div class="cards-choice">';
        for (let i = 0; i < p.skills.length; i++) {
          let s = p.skills[i];
          content += `<div class="choice-card skill-limit-card" id="skill-limit-${i}" data-idx="${i}" onclick="selectSkillLimitDiscard(${i})">
            <div class="card-name">${s.name}</div>
            <div class="card-desc">${s.type==='trap'?'陷阱':'主动'} | ${s.cost}💰 | ${s.desc}</div>
          </div>`;
        }
        content += '</div>';
        showModal('🎴 技能卡超上限，请弃牌', content, [
          {text:'确认弃牌', cls:'btn-primary', action: () => {
            let sel = document.querySelector('.skill-limit-card.selected');
            if (!sel) return;
            let discardIdx = parseInt(sel.dataset.idx);
            if (isNaN(discardIdx) || discardIdx < 0 || discardIdx >= p.skills.length) return;
            let discarded = p.skills.splice(discardIdx, 1)[0];
            G.skillDiscardPile.push(discarded);
            G.usedSkills.delete(discarded.id);
            addLog(`技能卡超上限，你弃掉了「${discarded.name}」`, 'action');
            closeModal();
            resolve();
          }}
            ]);
          });
        } else {
          // AI: discard lowest value (trap first, then first skill)
          let discardIdx = p.skills.findIndex(s => s.type === 'trap');
      if (discardIdx < 0) discardIdx = 0;
      let discarded = p.skills.splice(discardIdx, 1)[0];
      G.skillDiscardPile.push(discarded);
      G.usedSkills.delete(discarded.id);
      addLog(`${p.name} 技能卡超上限，弃掉「${discarded.name}」`, 'action');
    }
  }
  
  // Enforce hand (number cards) limit
  while (p.hand.length > maxHand) {
    if (p.isHuman) {
      await new Promise(resolve => {
        let excess = p.hand.length - maxHand;
        let content = `<p>手牌超出上限(${maxHand}张)！当前${p.hand.length}张，需弃掉${excess > 1 ? excess+'张' : '1张'}：</p>`;
        content += '<div class="cards-choice">';
        for (let i = 0; i < p.hand.length; i++) {
          let c = p.hand[i];
          content += `<div class="choice-card hand-limit-card" id="hand-limit-${i}" data-idx="${i}" onclick="selectHandLimitDiscard(${i})">
            <div class="card-name">${cardName(c)}</div>
            <div class="card-desc" style="color:#888">点数 ${c.rank}</div>
          </div>`;
        }
        content += '</div>';
        content += `<p style="color:#f0c040;font-size:12px;margin-top:8px">还需弃掉 ${excess} 张</p>`;
        showModal('🃏 手牌超上限，请弃牌', content, [
          {text:'确认弃牌', cls:'btn-primary', action: () => {
            let selected = document.querySelectorAll('.hand-limit-card.selected');
            if (selected.length === 0) return;
            if (selected.length > excess) {
              addLog(`只需弃掉${excess}张，请取消多选的牌`, 'danger');
              return;
            }
            // Collect selected indices via data-idx attribute, sort descending to splice safely
            let indices = Array.from(selected).map(el => parseInt(el.dataset.idx)).sort((a,b) => b-a);
            // Safety: verify indices are within bounds
            for (let i of indices) {
              if (isNaN(i) || i < 0 || i >= p.hand.length) continue;
              let discarded = p.hand.splice(i, 1)[0];
              G.discardPile.push(discarded);
              addLog(`手牌超上限，你弃掉了${cardName(discarded)}`, 'action');
            }
            closeModal();
            resolve();
          }}
            ]);
          });
        } else {
          // AI: discard lowest rank cards
      let sorted = [...p.hand].sort((a,b) => a.rank - b.rank);
      let toDiscard = sorted.slice(0, p.hand.length - maxHand);
      for (let c of toDiscard) {
        p.hand.splice(p.hand.indexOf(c), 1);
        G.discardPile.push(c);
      }
      addLog(`${p.name} 手牌超上限，弃掉${toDiscard.map(c=>cardName(c)).join('、')}`, 'action');
    }
  }
}

window.selectSkillLimitDiscard = function(idx) {
  document.querySelectorAll('.skill-limit-card').forEach(el => el.classList.remove('selected'));
  document.getElementById(`skill-limit-${idx}`).classList.add('selected');
};

window.selectHandLimitDiscard = function(idx) {
  let el = document.getElementById(`hand-limit-${idx}`);
  el.classList.toggle('selected');
};

// ========== UNIFIED TURN PHASE (S5+S6+S7) ==========

// Ensure public cards don't exceed 7 (FIFO remove oldest non-frozen)
function trimPublicCards() {
  while (G.publicCards.length > 7) {
    let idx = G.publicCards.findIndex(pc => !pc.frozen);
    if (idx >= 0) {
      let removed = G.publicCards.splice(idx, 1)[0];
      G.discardPile.push(removed.card);
      addLog(`公共牌超上限7张，最早的非冻结牌${cardName(removed.card)}被移出`, 'action');
    } else {
      break;
    }
  }
}

// ========== TRAP SYSTEM (P0-#2) ==========
// Traps are placed during action phase, trigger on conditions, pay fee on trigger
// Trigger types: cover (盖牌), skill_use (技能使用), draw (摸牌), showdown_lose (比牌落败)

function placeTrap(skill, playerIdx) {
  G.traps.push({
    skill: skill,
    ownerIdx: playerIdx,
    triggered: false,
    disabled: false,
    placedLog: `${G.players[playerIdx].name}布置了陷阱「${skill.name}」`
  });
  addLog(`→ 布置陷阱「${skill.name}」`, 'action');
}

// Disable a player's traps when they fold (rule 7.3)
function disablePlayerTraps(playerIdx) {
  for (let trap of G.traps) {
    if (trap.ownerIdx === playerIdx && !trap.triggered) {
      trap.disabled = true;
    }
  }
}

// ===== Trigger type 1: Cover cards (盖牌时触发) =====
// Triggers: tariff(关税壁垒), maelstrom(大漩涡), corpse_wall(尸墙), equalize(强制平权)
async function checkTrapsOnCover(coveringPlayerIdx, coverCount) {
  for (let trap of G.traps) {
    if (trap.triggered || trap.disabled) continue;
    if (trap.ownerIdx === coveringPlayerIdx) continue;
    
    let trigger = false;
    let tid = trap.skill.id;
    
    if ((tid === 'tariff' || tid === 'maelstrom') && coverCount >= 2) trigger = true;
    if (tid === 'corpse_wall') trigger = true;
    if (tid === 'equalize' && G._lastDrawEvent && G._lastDrawEvent.playerIdx === coveringPlayerIdx) {
      trigger = true;
      G._lastDrawEvent = null;
    }
    
    if (trigger) await triggerTrap(trap, coveringPlayerIdx);
  }
}

// ===== Trigger type 2: Skill use (技能使用时触发) =====
// Triggers: fortify(加固), absolute_barrier(绝对壁垒), hold_ground(死守),
//           undercurrent(暗流), bulletproof(避弹衣), scapegoat(替死鬼),
//           common_benefit(共同受惠), equalize(强制平权)
async function checkTrapsOnSkillUse(userIdx, skillUsed) {
  // Prevent infinite loop from trap copies triggering other traps
  if (skillUsed && skillUsed._isTrapCopy) return;
  for (let trap of G.traps) {
    if (trap.triggered || trap.disabled) continue;
    if (trap.ownerIdx === userIdx) continue;
    
    let tid = trap.skill.id;
    let skillIsBuff = isBuffSkill(skillUsed);
    let skillIsDebuff = isDebuffSkill(skillUsed);
    let trigger = false;
    
    if (tid === 'fortify' && userIdx !== trap.ownerIdx) trigger = true;
    if (tid === 'absolute_barrier' && userIdx !== trap.ownerIdx && skillIsBuff) trigger = true;
    if (tid === 'hold_ground' && userIdx !== trap.ownerIdx && skillIsDebuff) trigger = true;
    if (tid === 'undercurrent' && userIdx !== trap.ownerIdx) trigger = true;
    if (tid === 'bulletproof' && userIdx !== trap.ownerIdx) trigger = true;
    if (tid === 'scapegoat' && userIdx !== trap.ownerIdx) trigger = true;
    if (tid === 'common_benefit' && userIdx !== trap.ownerIdx && skillIsBuff) trigger = true;
    if (tid === 'equalize' && userIdx !== trap.ownerIdx && isDrawSkill(skillUsed)) trigger = true;
    
    if (trigger) await triggerTrap(trap, userIdx, skillUsed);
  }
}

// ===== Trigger type 3: Showdown lose (比牌落败时触发) =====
// Triggers: destiny_reverse(命运逆转)
async function checkTrapsOnShowdownLose(loserIdx) {
  let triggered = false;
  for (let trap of G.traps) {
    if (trap.triggered || trap.disabled) continue;
    if (trap.ownerIdx !== loserIdx) continue;
    if (trap.skill.id === 'destiny_reverse') {
      await triggerTrap(trap, loserIdx);
      triggered = true;
    }
  }
  return triggered;
}

// ===== Skill category helpers =====
function isBuffSkill(skill) {
  return ['force_supply','purify','filter','quick_load','rain','tax','asset_seize',
    'lucky_coin','lethal','insider_trade','black_box','requisition','flush','geyser',
    'tactical_arm','fortress','sonar','intimidate','fortify',
    'mad_dig','nether_gate','plague','corpse_craft','bone_spear','sacrifice'].includes(skill.id);
}
function isDebuffSkill(skill) {
  return ['tax','asset_seize','lethal','intimidate','sacrifice','dark_ritual','bone_spear','surcharge','requisition'].includes(skill.id);
}
function isDrawSkill(skill) {
  return ['force_supply','purify','filter','quick_load','rain','lucky_coin','lethal',
    'insider_trade','tactical_arm','fortress','sonar','flush','geyser',
    'mad_dig','nether_gate','corpse_craft'].includes(skill.id);
}

// ===== Core: trigger a trap (pay fee + execute effect) =====
async function triggerTrap(trap, triggererIdx, skillUsed) {
  let owner = G.players[trap.ownerIdx];
  let cost = trap.skill.level >= 2 ? 3 : 1;
  
  if (owner.chips < cost) {
    addLog(`💥 ${owner.name}的「${trap.skill.name}」触发但筹码不足（需${cost}💰），陷阱失效！`, 'danger');
    trap.triggered = true;
    return;
  }
  
  owner.chips -= cost;
  G.trapFeeTotal += cost;
  G.pot += cost;
  trap.triggered = true;
  addLog(`💥 陷阱触发！${owner.name}的「${trap.skill.name}」→ 发动（-${cost}💰）`, 'result');
  
  await executeTrapEffect(trap.skill, trap.ownerIdx, triggererIdx, skillUsed);
}

// ===== Execute trap effects =====
async function executeTrapEffect(skill, ownerIdx, targetIdx, skillUsed) {
  let owner = G.players[ownerIdx];
  let target = G.players[targetIdx];
  let isL2 = skill.level >= 2;
  
  switch(skill.id) {
    case 'tariff': {
      let steal = Math.min(isL2 ? 6 : 3, target.chips);
      if (steal > 0) { target.chips -= steal; owner.chips += steal; }
      addLog(`→ 「关税壁垒」夺取${target.name} ${steal}💰`, 'result');
      break;
    }
    case 'fortify': {
      let handReq = isL2 ? 4 : 5;
      let gain = isL2 ? 5 : 2;
      if (owner.hand.length >= handReq) {
        owner.chips += gain;
        addLog(`→ 「加固」无效化技能，手牌${owner.hand.length}>=${handReq}→ +${gain}💰`, 'result');
      } else {
        addLog(`→ 「加固」无效化技能（手牌${owner.hand.length}<${handReq}，无额外收益）`, 'info');
      }
      break;
    }
    case 'absolute_barrier': {
      let drawCount = isL2 ? 3 : 1;
      let cards = drawFromDeck(drawCount);
      owner.hand.push(...cards);
      addLog(`→ 「绝对壁垒」无效化增益技能，摸${drawCount}张`, 'result');
      break;
    }
    case 'hold_ground': {
      if (isL2) {
        let skills = drawSkills(2, true);
        owner.skills.push(...skills);
        addLog(`→ 「死守L2」无效化减益，获得2张技能卡`, 'result');
      } else {
        let skills = drawSkills(1, false);
        if (skills.length > 0) {
          owner.skills.push(skills[0]);
          addLog(`→ 「死守」无效化减益，获得「${skills[0].name}」`, 'result');
        }
      }
      break;
    }
    case 'maelstrom': {
      let freezeCount = isL2 ? 2 : 1;
      let frozen = 0;
      for (let i = target.coverCards.length - 1; i >= 0 && frozen < freezeCount; i--) {
        if (!target.coverCards[i]._frozen) { target.coverCards[i]._frozen = true; frozen++; }
      }
      if (isL2) {
        let cards = drawFromDeck(1);
        owner.hand.push(...cards);
        owner.chips += 1;
        addLog(`→ 「大漩涡L2」冻结${frozen}张盖牌，摸1张，+1💰`, 'result');
      } else {
        owner.chips += 2;
        addLog(`→ 「大漩涡」冻结${frozen}张盖牌，+2💰`, 'result');
      }
      break;
    }
    case 'undercurrent': {
      if (target.hand.length > 0) {
        let stolen = target.hand.splice(Math.floor(Math.random() * target.hand.length), 1)[0];
        G.publicCards.push({card: stolen, frozen: false, covered: false, owner: ownerIdx});
        if (isL2) {
          let cards = drawFromDeck(2);
          owner.hand.push(...cards);
          addLog(`→ 「暗流L2」${target.name}的${cardName(stolen)}入公共池，摸2张`, 'result');
        } else {
          owner.chips += 1;
          addLog(`→ 「暗流」${target.name}的${cardName(stolen)}入公共池，+1💰`, 'result');
        }
        trimPublicCards();
        triggerWaterPressure('add');
      }
      break;
    }
    case 'common_benefit': {
      // Copy the full effect of the buff skill that triggered this trap
      if (skillUsed) {
        // Use skillUsed.level to determine L2 multiplier for the copy
        let isL2 = skillUsed.level >= 2;
        let multiplier = isL2 ? 2 : 1;
        // Clone the skill with trap owner as user and mark as copy to prevent infinite loops
        let clonedSkill = JSON.parse(JSON.stringify(skillUsed));
        clonedSkill._isTrapCopy = true;
        clonedSkill._trapCopyMultiplier = multiplier;
        addLog(`→ 「共同受惠」复制${target.name}的「${skillUsed.name}」效果（${isL2?'双倍':''}）`, 'result');
        await executeSkillEffect(clonedSkill, ownerIdx);
      } else {
        // Fallback: chip gain
        let gain = isL2 ? 6 : 3;
        owner.chips += gain;
        addLog(`→ 「共同受惠」${isL2?'双倍':''}复制增益效果，+${gain}💰`, 'result');
      }
      break;
    }
    case 'equalize': {
      let discCount = isL2 ? 2 : 1;
      let gain = isL2 ? 4 : 2;
      let discarded = 0;
      for (let i = 0; i < discCount && target.hand.length > 0; i++) {
        let disc = target.hand.splice(Math.floor(Math.random() * target.hand.length), 1)[0];
        G.discardPile.push(disc);
        discarded++;
      }
      if (discarded > 0) {
        owner.chips += gain;
        addLog(`→ 「强制平权」${target.name}被迫弃${discarded}张，${owner.name}+${gain}💰`, 'result');
      }
      break;
    }
    case 'bulletproof': {
      let topCard = drawFromDeck(1);
      if (topCard.length > 0) {
        let c = topCard[0]; G.discardPile.push(c);
        let red = isRed(c);
        addLog(`→ 「避弹衣」判定：${cardName(c)}（${red?'红':'黑'}）`, 'info');
        if (isL2) {
          if (red) {
            // L2 Red: obtain AND release the blocked skill as your own
            if (skillUsed) {
              let clonedSkill = JSON.parse(JSON.stringify(skillUsed));
              clonedSkill._isTrapCopy = true;
              addLog(`→ L2红：获得并释放「${skillUsed.name}」！`, 'result');
              await executeSkillEffect(clonedSkill, ownerIdx);
            } else {
              owner.chips += 3;
              let cards = drawFromDeck(1);
              owner.hand.push(...cards);
              addLog(`→ L2红：获得技能效果(+3💰)，摸1张`, 'result');
            }
          } else {
            let cards = drawFromDeck(1);
            owner.hand.push(...cards);
            addLog(`→ L2黑：摸1张`, 'result');
          }
        } else {
          if (red) {
            let cards = drawFromDeck(1);
            owner.hand.push(...cards);
            addLog(`→ L1红：技能无效化，摸1张`, 'result');
          } else {
            addLog(`→ L1黑：技能无效化`, 'result');
          }
        }
      }
      break;
    }
    case 'destiny_reverse': {
      let flipCount = isL2 ? 3 : 2;
      let newCards = drawFromDeck(flipCount);
      if (newCards.length > 0) {
        let topJudge = drawFromDeck(1);
        let isRedJudge = topJudge.length > 0 && isRed(topJudge[0]);
        if (topJudge.length > 0) G.discardPile.push(topJudge[0]);
        if (isRedJudge) {
          owner._destinyExtraCover = newCards;
          addLog(`→ 「命运逆转」判定红！翻${flipCount}张作为额外盖牌：${newCards.map(c=>cardName(c)).join(' ')}`, 'result');
        } else {
          for (let nc of newCards) {
            G.publicCards.push({card: nc, frozen: false, covered: false, owner: ownerIdx});
          }
          addLog(`→ 「命运逆转」判定黑！翻${flipCount}张作为公共牌：${newCards.map(c=>cardName(c)).join(' ')}`, 'result');
          trimPublicCards();
        }
      }
      break;
    }
    case 'corpse_wall': {
      if (target.coverCards.length > 0 && G.discardPile.length > 0) {
        let poolSize = isL2 ? 3 : 1;
        let poolCards = [];
        for (let i = 0; i < Math.min(poolSize, G.discardPile.length); i++) {
          poolCards.push(G.discardPile.shift());
        }
        let combined = shuffle([...target.coverCards, ...poolCards]);
        let returnCount = Math.min(target.coverCards.length, combined.length);
        if (target.isHuman) {
          // Human opponent: choose which cards to keep as cover cards
          await new Promise(resolve => {
            let content = `<p>「尸墙」触发！你的盖牌与${poolSize}张弃牌洗牌后，请选择${returnCount}张作为盖牌：</p>`;
            content += '<div class="cards-choice">';
            for (let i = 0; i < combined.length; i++) {
              let tag = i < target.coverCards.length ? '（原盖牌）' : '（弃牌）';
              content += `<div class="choice-card hand-limit-card" id="wall-${i}" onclick="toggleWallCard(${i})">
                <div class="card-name">${cardName(combined[i])} ${tag}</div>
              </div>`;
            }
            content += '</div>';
            showModal('🧱 尸墙 — 选择盖牌', content, [
              {text: `确认选${returnCount}张`, cls: 'btn-primary', action: () => {
                let selected = [];
                for (let i = combined.length - 1; i >= 0; i--) {
                  let el = document.getElementById(`wall-${i}`);
                  if (el && el.classList.contains('selected')) {
                    selected.unshift(combined.splice(i, 1)[0]);
                  }
                }
                // Auto-fill if not enough selected
                while (selected.length < returnCount && combined.length > 0) {
                  selected.push(combined.shift());
                }
                target.coverCards = selected.slice(0, returnCount);
                for (let d of combined) G.discardPile.push(d);
                for (let d of selected.slice(returnCount)) G.discardPile.push(d);
                addLog(`→ 「尸墙」${target.name}选择了${returnCount}张盖牌`, 'result');
                resolve();
              }}
            ]);
            window.toggleWallCard = function(idx) {
              let el = document.getElementById(`wall-${idx}`);
              el.classList.toggle('selected');
              let count = document.querySelectorAll('.hand-limit-card.selected').length;
              addLog(`已选${count}/${returnCount}张`, 'info');
            };
          });
        } else {
          // AI: random assignment (AI opponent cannot strategically choose face-down cards)
          target.coverCards = combined.slice(0, returnCount);
          for (let d of combined.slice(returnCount)) G.discardPile.push(d);
          addLog(`→ 「尸墙」${target.name}的盖牌与${poolSize}张弃牌洗牌重分配`, 'result');
        }
      }
      break;
    }
    case 'scapegoat': {
      if (owner.hand.length > 0) {
        let disc = owner.hand.splice(0, 1)[0];
        G.discardPile.push(disc);
        owner.chips += 4;
        addLog(`→ 「替死鬼」弃${cardName(disc)}，技能无效化，+4💰`, 'result');
        if (isL2) {
          let steal = Math.min(2, target.chips);
          if (steal > 0) { target.chips -= steal; owner.chips += steal; }
          addLog(`→ L2反弹！夺取${target.name} ${steal}💰`, 'result');
        }
      } else {
        owner.chips += 2;
        addLog(`→ 「替死鬼」无手牌可弃，效果减弱+2💰`, 'danger');
      }
      break;
    }
  }
  
  renderAll();
}

// Clean up all traps at end of showdown
function cleanupTraps() {
  let trapCount = G.traps.filter(t => !t.triggered).length;
  if (trapCount > 0) {
    addLog(`${trapCount}个未触发陷阱被弃置`, 'action');
  }
  G.traps = [];
}

// Each player's turn: trigger passives → use skills/traps freely → cover/fold/check to end
// S7 raise mechanism: if someone covers MORE than current target, previous players must re-act

async function doTurnPhase() {
  G.phase = 'action';
  addLog('S5+S6 行动阶段（被动触发→技能/陷阱→盖牌/过牌/Fold）', 'phase');
  
  let startIdx = (G.dealerIdx + 1) % G.players.length;
  let totalPlayers = G.players.length;
  
  // Track which players have already acted this round of betting
  let actedSet = new Set(); // players who have covered/folded/checked since last raise
  let lastRaiserIdx = -1;
  
  // First, trigger all players' passives
  for (let i = 0; i < totalPlayers; i++) {
    let idx = (startIdx + i) % totalPlayers;
    let p = G.players[idx];
    if (p.eliminated) continue;
    G.currentActorIdx = idx;
    renderAll();
    await triggerPlayerPassives(idx);
  }
  
  // Main action loop with raise support + check support
  let maxIterations = 50;
  let iteration = 0;
  let s8CheckCount = 0; // track how many times all-checked (prevent infinite loop)
  const MAX_S8_CHECKS = 3; // at most 3 rounds of all-check before forcing end
  G.anyoneCovered = false;
  
  // Reset check/cover states for this action round
  for (let p of G.players) {
    p.checkedThisTurn = false;
  }
  
  while (iteration < maxIterations) {
    iteration++;
    let someoneActed = false;
    
    // Build list of non-folded, non-eliminated players
    let nonFoldedAlive = [];
    for (let i = 0; i < totalPlayers; i++) {
      if (!G.players[i].eliminated && !G.players[i].foldThisTurn) {
        nonFoldedAlive.push(i);
      }
    }
    if (nonFoldedAlive.length === 0) break; // everyone folded
    if (nonFoldedAlive.length <= 1) break; // only one player left
    
    for (let i = 0; i < totalPlayers; i++) {
      let idx = (startIdx + i) % totalPlayers;
      let p = G.players[idx];
      
      if (p.eliminated || p.foldThisTurn) continue;
      if (actedSet.has(idx)) continue;
      
      G.currentActorIdx = idx;
      // Track discard pile size for plague aura
      G._discardCountAtTurnStart[idx] = G.discardPile.length;
      renderAll();
      
      if (p.isHuman) {
        // Note: coverCards stay on the table, player only adds more from remaining hand
        
        // Wait for player to use skills then cover/fold/check
        await new Promise(resolve => {
          window._endTurn = resolve;
        });
        window._endTurn = null;
      } else {
        await delay(400);
        
        // Note: coverCards stay on the table, AI only adds more from remaining hand
        
        await aiAction(idx);
      }
      
      // After acting, enforce hand/skill limits (skills may have added cards)
      await enforceHandLimit(idx);
      
      // Check plague aura: if any player discarded cards this turn, trigger plague
      let prevDiscard = G._discardCountAtTurnStart[idx] || 0;
      let currDiscard = G.discardPile.length;
      if (currDiscard > prevDiscard) {
        triggerPlague(idx, currDiscard - prevDiscard);
      }
      
      // After acting, mark as acted and handle raises IMMEDIATELY
      if (p.foldThisTurn || p.checkedThisTurn) {
        actedSet.add(idx);
        someoneActed = true;
      } else if (p.coverCards.length > 0) {
        // Player covered cards — must meet or exceed coverTarget (enforced by playerCoverCards/aiAction)
        actedSet.add(idx);
        someoneActed = true;
        
        // Determine raise status
        let isNewCover = (G.coverTarget === 1) || (p.coverCards.length > G.coverTarget);
        let isRaise = (p.coverCards.length > G.coverTarget);

        if (isRaise) {
          // Explicit raise: covered more than current target
          G.coverTarget = p.coverCards.length;
          addLog(`🎯 加注！盖牌目标提升至 ${G.coverTarget} 张`, 'info');
        } else if (isNewCover) {
          // First cover this round or meeting existing target
          // Still need to make others respond (first person to cover sets the pace)
          if (!G.anyoneCovered) {
            G.coverTarget = Math.max(G.coverTarget, p.coverCards.length);
          }
        }

        // Make other covered/folded/check players respond to this cover action
        if (isNewCover) {
          G.anyoneCovered = true;
          for (let j = 0; j < totalPlayers; j++) {
            let pj = G.players[j];
            if (pj.eliminated || pj.foldThisTurn) continue;
            if (pj.allInThisTurn) continue;
            if (j === idx) continue;
            // Players who already acted but now face a new cover must re-act
            actedSet.delete(j);
          }
          renderAll();
        }
      }
    }
    
    // If ANY player covered cards this round,
    // checked players must re-act (they checked before knowing someone would cover)
    {
      let hasCovered = false;
      for (let i = 0; i < totalPlayers; i++) {
        if (G.players[i].coverCards.length > 0 && !G.players[i].foldThisTurn) {
          hasCovered = true;
          break;
        }
      }
      if (hasCovered) {
        for (let i = 0; i < totalPlayers; i++) {
          let p = G.players[i];
          if (p.eliminated || p.foldThisTurn) continue;
          if (p.allInThisTurn) continue;
          // Checked players need to act again now that someone has covered
          if (p.checkedThisTurn && p.coverCards.length === 0) {
            actedSet.delete(i);
          }
        }
        if (!nonFoldedAlive.every(idx => actedSet.has(idx))) {
          continue;
        }
      }
    }
    
    // Check if all non-folded non-eliminated players have acted
    let allActed = nonFoldedAlive.every(idx => actedSet.has(idx));
    
    if (!allActed) {
      if (!someoneActed) break; // safety: no progress
      continue;
    }
    
    // All non-folded players have acted. Determine outcome:
    let coveredPlayers = nonFoldedAlive.filter(idx => G.players[idx].coverCards.length > 0);
    let checkedPlayers = nonFoldedAlive.filter(idx => G.players[idx].checkedThisTurn && G.players[idx].coverCards.length === 0);
    
    if (coveredPlayers.length > 0) {
      // Verify all non-folded players either covered (meeting target) or all-in
      let allMatch = nonFoldedAlive.every(idx => 
        G.players[idx].foldThisTurn || 
        G.players[idx].coverCards.length >= G.coverTarget ||
        (G.players[idx].coverCards.length < G.coverTarget && G.players[idx].coverCards.length > 0) // all-in
      );
      
      if (allMatch) break; // Round complete: everyone has covered or folded
    }
    
    if (checkedPlayers.length === nonFoldedAlive.length) {
      s8CheckCount++;
      if (s8CheckCount >= MAX_S8_CHECKS) {
        // Prevent infinite loop: after MAX_S8_CHECKS rounds of all-check, force end
        addLog(`连续${MAX_S8_CHECKS}轮全员过牌，本回合强制结束`, 'info');
        break;
      }
      // S8: All players checked (no one covered, no one folded) → flip 1 public card
      addLog('S8 过牌判定：所有人都过牌，系统额外翻开1张公共牌！', 'phase');
      let newCards = drawFromDeck(1);
      for (let c of newCards) {
        G.publicCards.push({card:c, frozen:false, covered:false});
      }
      trimPublicCards();
      addLog(`→ 翻开：${newCards.map(c=>cardName(c)).join(' ')}`, 'result');
      // Gunner resonance: red cards revealed
      for (let c of newCards) {
        if (isRed(c)) {
          for (let gi = 0; gi < G.players.length; gi++) {
            if (G.players[gi].eliminated) continue;
            triggerGunnerResonance(gi, c);
          }
        }
      }
      renderAll();
      await delay(800);
      
      // Reset for another round of action
      actedSet.clear();
      for (let p of G.players) {
        p.checkedThisTurn = false;
        if (p.foldThisTurn || p.eliminated) {
          actedSet.add(G.players.indexOf(p));
        }
      }
      continue;
    }
    
    if (!someoneActed) break;
  }
}

// ========== S4.1: Upgrade Phase (Passive + Skill) ==========
async function upgradePassivePhase() {
  // Only available from R2 onwards (need some rounds to accumulate chips)
  if (G.stage === 1 && G.turnInRound <= 2) return;
  
  for (let i = 0; i < G.players.length; i++) {
    let p = G.players[i];
    if (p.eliminated) continue;
    
    // Reset per-round flags
    p.skillUpgradedThisTurn = false;
    p.surchargeActive = false;
    p.plagueActive = false;
    p.fortressActive = false;
    p.tempHandBonus = 0;
    
    // Check if player has any upgradeable passives
    let upgradeablePassives = p.passives.filter(ps => ps.level < ps.maxLevel);
    let upgradeableSkills = p.skills.filter(s => !s.level || s.level < 2);
    
    if (upgradeablePassives.length === 0 && upgradeableSkills.length === 0) continue;
    
    if (p.isHuman) {
      await humanUpgradePhase(p, upgradeablePassives, upgradeableSkills);
    } else {
      await aiUpgradePhase(p, upgradeablePassives, upgradeableSkills);
    }
  }
}

async function humanUpgradePhase(player, upgradeablePassives, upgradeableSkills) {
  return new Promise(resolve => {
    G.waitingForInput = true;
    let content = `<p>是否升级卡片？</p>`;
    
    // Passive upgrades
    if (upgradeablePassives.length > 0) {
      content += `<p><strong>被动卡升级</strong>（费用 ${UPGRADE_COST}💰，当前 ${player.chips}💰）</p>`;
      content += '<div class="cards-choice">';
      for (let i = 0; i < upgradeablePassives.length; i++) {
        let ps = upgradeablePassives[i];
        content += `<div class="choice-card" id="up-passive-${i}" onclick="selectUpgradeAny('up-passive-${i}')">
          <div class="card-name">${ps.name} <span style="color:#888">L${ps.level}</span> → <span style="color:var(--gold)">L${ps.level+1}</span></div>
          <div class="card-desc">当前: ${ps.desc}</div>
          <div class="card-desc" style="color:var(--gold)">升级: ${ps.l2Desc || '效果增强'}</div>
        </div>`;
      }
      content += '</div>';
    }
    
    // Skill upgrades
    if (upgradeableSkills.length > 0) {
      content += `<p><strong>技能卡升级</strong>（费用 ${SKILL_UPGRADE_COST}💰，当前 ${player.chips}💰，每回合限1次）</p>`;
      content += '<div class="cards-choice">';
      for (let i = 0; i < upgradeableSkills.length; i++) {
        let s = upgradeableSkills[i];
        let poolEntry = SKILL_POOL.find(sp => sp.id === s.id);
        let l2Desc = poolEntry ? (getL2Desc(s.id) || '效果增强 + 费用3💰') : '效果增强 + 费用3💰';
        content += `<div class="choice-card" id="up-skill-${i}" onclick="selectUpgradeAny('up-skill-${i}')">
          <div class="card-name">${s.name} <span style="color:#888">L1</span> → <span style="color:var(--gold)">L2</span></div>
          <div class="card-desc">当前: ${s.desc} (${s.cost}💰)</div>
          <div class="card-desc" style="color:var(--gold)">升级: ${l2Desc}</div>
        </div>`;
      }
      content += '</div>';
    }
    
    showModal('⬆️ 升级阶段', content, [
      {text:'跳过', cls:'btn-secondary', action:() => {
        G.waitingForInput = false; closeModal(); resolve();
      }},
      {text:'确认升级', cls:'btn-primary', action:() => {
        let sel = document.querySelector('.choice-card.selected');
        if (!sel) { addLog('请选择要升级的卡片', 'danger'); return; }
        let idx = parseInt(sel.id.split('-').pop());
        let isSkill = sel.id.startsWith('up-skill');
        
        if (isSkill) {
          if (player.skillUpgradedThisTurn) { addLog('本回合已升级过技能卡', 'danger'); return; }
          let target = upgradeableSkills[idx];
          if (player.chips < SKILL_UPGRADE_COST) { addLog('筹码不足！', 'danger'); return; }
          player.chips -= SKILL_UPGRADE_COST;
          target.level = 2;
          target.cost = 3;
          target.desc = getL2Desc(target.id) || target.desc + ' (L2)';
          player.skillUpgradedThisTurn = true;
          addLog(`你升级了技能卡「${target.name}」→ L2！(-${SKILL_UPGRADE_COST}💰)`, 'result');
        } else {
          let target = upgradeablePassives[idx];
          if (player.chips < UPGRADE_COST) { addLog('筹码不足！', 'danger'); return; }
          player.chips -= UPGRADE_COST;
          target.level = 2;
          target.desc = target.l2Desc || target.desc + ' (L2)';
          addLog(`你升级了「${target.name}」→ L2！(-${UPGRADE_COST}💰)`, 'result');
          applyPassiveUpgradeEffect(target, G.players.indexOf(player));
        }
        closeModal(); G.waitingForInput = false; renderAll(); resolve();
      }}
    ]);
  });
}

async function aiUpgradePhase(player, upgradeablePassives, upgradeableSkills) {
  // AI: prefer skill upgrade if affordable and has good skills
  if (upgradeableSkills.length > 0 && !player.skillUpgradedThisTurn && player.chips >= SKILL_UPGRADE_COST + 5) {
    // Priority: skills with high L2 value
    let priority = {'purify':9,'filter':8,'force_supply':7,'lethal':8,'bone_spear':7,'tax':9,
      'asset_seize':6,'insider_trade':8,'ap_round':7,'requisition':7,'corpse_craft':8,
      'geyser':7,'tactical_arm':7,'lucky_coin':6,'quick_load':6,'mad_dig':6};
    let best = upgradeableSkills[0];
    let bestScore = 0;
    for (let s of upgradeableSkills) {
      let score = priority[s.id] || 3;
      if (player.aiProfile && player.aiProfile.stars >= 4) score += 3;
      if (player.aiProfile && player.aiProfile.stars >= 5) score += 2;
      if (score > bestScore) { bestScore = score; best = s; }
    }
    if (bestScore >= 6 && player.chips >= 15) {
      player.chips -= SKILL_UPGRADE_COST;
      best.level = 2;
      best.cost = 3;
      best.desc = getL2Desc(best.id) || best.desc + ' (L2)';
      player.skillUpgradedThisTurn = true;
      addLog(`${player.name} 升级了技能卡「${best.name}」→ L2！(-${SKILL_UPGRADE_COST}💰)`, 'action');
      renderAll();
      await delay(600);
    }
  }
  
  // AI: passive upgrade (existing logic)
  if (player.chips < 20) return;
  if (upgradeablePassives.length === 0) return;
  
  let priority = {'treasury':10, 'tax_law':9, 'cash_out':8, 'expand_bag':7, 'undead':6, 'freeze_field':5, 'eagle_eye':5, 'fog':4};
  let best = upgradeablePassives[0];
  let bestScore = -1;
  for (let ps of upgradeablePassives) {
    let score = priority[ps.id] || 3;
    if (player.aiProfile && player.aiProfile.stars >= 4) score += 3;
    if (player.aiProfile && player.aiProfile.stars >= 5) score += 2;
    if (score > bestScore) { bestScore = score; best = ps; }
  }
  
  if (bestScore >= 8 && player.chips >= 25) {
    player.chips -= UPGRADE_COST;
    best.level = 2;
    best.desc = best.l2Desc || best.desc + ' (L2)';
    addLog(`${player.name} 升级了「${best.name}」→ L2！(-${UPGRADE_COST}💰)`, 'action');
    applyPassiveUpgradeEffect(best, G.players.indexOf(player));
    renderAll();
    await delay(600);
  }
}

// ========== RESONANCE DETECTION & EFFECTS ==========
function checkResonance(playerIdx) {
  let p = G.players[playerIdx];
  // Count passive cards by school
  let schoolCounts = {};
  for (let ps of p.passives) {
    let s = ps.school;
    schoolCounts[s] = (schoolCounts[s] || 0) + 1;
  }
  
  // Check each school for resonance
  for (let school in RESONANCE_TABLE) {
    let count = schoolCounts[school] || 0;
    let resDef = RESONANCE_TABLE[school];
    
    // Check if we should have resonance for this school
    if (count >= 2) {
      let targetLevel = count >= 3 ? 2 : 1;
      let levelDef = resDef.levels[targetLevel - 1];
      
      if (!p.resonance) {
        // No resonance yet, grant it
        p.resonance = {
          school: school,
          level: targetLevel,
          id: resDef.id,
          name: levelDef.name,
          desc: levelDef.desc,
          require: levelDef.require
        };
        addLog(`✨ ${p.name} 拥有${count}张${schoolName(school)}被动卡，触发共鸣「${levelDef.name}」！`, 'result');
        applyResonanceInitEffect(p, playerIdx);
      } else if (p.resonance.school === school && p.resonance.level < targetLevel) {
        // Upgrade existing resonance
        let newDef = resDef.levels[targetLevel - 1];
        p.resonance.level = targetLevel;
        p.resonance.name = newDef.name;
        p.resonance.desc = newDef.desc;
        p.resonance.require = newDef.require;
        addLog(`✨ ${p.name} 共鸣升级：「${newDef.name}」！`, 'result');
        applyResonanceUpgradeEffect(p, playerIdx);
      }
      // Note: if player has resonance for one school but gets 2+ passives of another school,
      // we keep the original resonance (only 1 resonance per player)
    }
  }
  
  // If player loses passive cards (e.g. not enough for resonance), resonance persists
  // (共鸣等级独立追踪 - per rules doc)
}

function schoolName(school) {

  return names[school] || school;
}

// Trigger hoarder resonance: end of turn, if hand >= 7, pay 3 chips (L1 only)
function triggerHoarderResonance(player) {
  if (!player.resonance || player.resonance.school !== 'hoarder') return;
  // Only L1 has the downside; L2 has no penalty
  if (player.resonance.level >= 2) return;
  if (player.hand.length >= 7) {
    player.chips -= 3;
    addLog(`${player.name}「绝对容积」→ 手牌${player.hand.length}张，支付3💰`, 'danger');
  }
}

// Trigger gunner resonance: when revealing a red card, richest opponent loses 1 chip
function triggerGunnerResonance(playerIdx, card) {
  let p = G.players[playerIdx];
  if (!p.resonance || p.resonance.school !== 'gunner') return;
  if (!isRed(card)) return;
  
  let richest = null;
  let richestIdx = -1;
  for (let i = 0; i < G.players.length; i++) {
    if (G.players[i].eliminated || i === playerIdx) continue;
    if (!richest || G.players[i].chips > richest.chips) {
      richest = G.players[i];
      richestIdx = i;
    }
  }
  if (!richest) return;
  
  if (p.resonance.level >= 2) {
    // L2: steal 1 chip
    richest.chips -= 1;
    p.chips += 1;
    addLog(`${p.name}「双发」→ 翻出红牌${cardName(card)}，从${richest.name}夺取1💰`, 'result');
  } else {
    // L1: richest loses 1 chip (goes to bank)
    richest.chips -= 1;
    addLog(`${p.name}「走火」→ 翻出红牌${cardName(card)}，${richest.name}失去1💰`, 'result');
  }
}

// Trigger a single player's passives at turn start
async function triggerPlayerPassives(idx) {

  for (let passive of p.passives) {

      if (lvl >= 2) {
        gain = 3;
        extraGain = p.chips < richest ? 2 : 0;
      } else {
        gain = 1;
        extraGain = p.chips < richest ? 1 : 0;
      }
      p.chips += gain + extraGain;
      addLog(`${p.name}「帝国国库${lvl>=2?'L2':''}」→ +${gain+extraGain}💰`, 'info');
    }

      let top = drawFromDeck(Math.min(5, G.deck.length));
      if (top.length === 0) {
        addLog(`${p.name}「鹰眼」→ 牌库为空`, 'info');
      } else if (p.isHuman) {
        // Let human choose reorder: click cards to set order (first click = top of deck)

        addLog(`「鹰眼${lvl>=2?'L2':''}」牌库顶${top.length}张：${cardList}`, 'info');
        
        // Build content with optional "take black card" for L2
        let blackCards = top.filter(c => !isRed(c));
        let l2Note = '';
        if (lvl >= 2 && blackCards.length > 0) {
          l2Note = '<p style="color:var(--gold);font-size:12px">⚡L2效果：点击1张黑色牌可将其直接入手</p>';
        }
        
        let chosen = await new Promise(resolve => {
          G.waitingForInput = true;
          let content = `<p>「鹰眼${lvl>=2?' L2':''}」— 牌库顶5张，点击设置排列顺序（点击顺序=从牌库顶到底）：</p>`;
          content += '<p style="color:#888;font-size:11px">第1个点击的牌会被放到牌库顶</p>';
          content += l2Note;
          content += '<div class="cards-choice">';
          for (let j = 0; j < top.length; j++) {
            let c = top[j];
            let colorStyle = isRed(c) ? 'color:#ff6b6b' : 'color:#ddd';
            let isBlack = !isRed(c);
            content += `<div class="choice-card eagle-eye-card ${isBlack ? 'black-card-available' : ''}" id="eagle-${j}" onclick="selectEagleOrder(${j})" style="position:relative">
              <div class="card-name" style="font-size:20px;${colorStyle}">${c.suit} ${RANK_NAMES[c.rank]}</div>
              <div class="eagle-order" id="eagle-order-${j}" style="display:none;position:absolute;top:2px;right:4px;font-size:10px;color:var(--gold);font-weight:bold"></div>
              ${lvl >= 2 && isBlack ? '<div style="font-size:9px;color:var(--gold);position:absolute;bottom:2px">黑色·可入手</div>' : ''}
            </div>`;
          }
          content += '</div>';
          
          let buttons = [
            {text:'确认排列', cls:'btn-primary', action:() => {
              let ordered = [];
              document.querySelectorAll('.eagle-eye-card.selected').forEach(el => {
                let idx = parseInt(el.id.split('-')[1]);
                ordered.push(top[idx]);
              });
              // Add unselected cards in original order
              for (let c of top) {
                if (!ordered.includes(c)) ordered.push(c);
              }
              G.waitingForInput = false;
              closeModal();
              resolve({ordered, takenCard: null});
            }},
            {text:'保持原序', cls:'btn-secondary', action:() => {
              G.waitingForInput = false;
              closeModal();
              resolve({ordered: [...top], takenCard: null});
            }}
          ];
          
          // L2: add "take black card" button
          if (lvl >= 2 && blackCards.length > 0) {
            buttons.push({text:'拿1张黑色牌入手', cls:'btn-success', action:() => {
              let sel = document.querySelector('.eagle-eye-card.selected');
              if (!sel) return;
              let idx = parseInt(sel.id.split('-')[1]);
              if (isRed(top[idx])) { addLog('L2效果只能拿黑色牌！', 'danger'); return; }
              let taken = top.splice(idx, 1)[0];
              G.waitingForInput = false;
              closeModal();
              resolve({ordered: top, takenCard: taken});
            }});
          }
          
          showModal(`🦅 鹰眼${lvl>=2?' L2':''}`, content, buttons);
        });
        
        // Push reordered cards back (chosen[0] = top of deck)
        G.deck.push(...chosen.ordered.reverse());
        if (chosen.takenCard) {
          p.hand.push(chosen.takenCard);
          addLog(`鹰眼L2→ 获得${cardName(chosen.takenCard)}`, 'result');
        }
        addLog(`牌库顶已按你的选择重新排列`, 'info');
      } else {
        // AI: sort by rank desc (biggest on top), L2: take 1 black card if available
        addLog(`${p.name}「鹰眼${lvl>=2?'L2':''}」→ 检索${top.length}张并重排`, 'info');
        if (lvl >= 2) {
          let blackIdx = top.findIndex(c => !isRed(c));
          if (blackIdx >= 0) {
            let taken = top.splice(blackIdx, 1)[0];
            p.hand.push(taken);
            addLog(`${p.name}鹰眼L2→ 获得${cardName(taken)}`, 'result');
          }
        }
        top.sort((a,b) => b.rank - a.rank);
        G.deck.push(...top.reverse());
      }
    }
    
    if (passive.id === 'undead') {
      let lvl = passive.level || 1;
      let discardCount = lvl >= 2 ? 2 : 1;
      let retrieveCount = lvl >= 2 ? 2 : 1;
      let discards = drawFromDeck(discardCount);
      for (let d of discards) {
        G.discardPile.push(d);
        addLog(`${p.name}「亡灵天灾${lvl>=2?'L2':''}」→ 弃${cardName(d)}`, 'action');
      }
      let minRetrieve = Math.max(3, retrieveCount); // need at least 3 in discard to retrieve
      if (G.discardPile.length >= minRetrieve) {
        let drawFromPile = Math.min(retrieveCount + 1, G.discardPile.length); // show 1 extra
        let retrieves = shuffle(G.discardPile.splice(0, drawFromPile));
        let chosenIndices;
        if (p.isHuman) {
          // Let human choose which card(s) to retrieve (multi-select up to retrieveCount)
          chosenIndices = await new Promise(resolve => {
            G.waitingForInput = true;
            let content = `<p>「亡灵天灾${lvl>=2?'L2':''}」— 从弃牌堆回收${retrieveCount}张牌：</p><div class="cards-choice">`;
            for (let j = 0; j < retrieves.length; j++) {
              let c = retrieves[j];
              let colorStyle = isRed(c) ? 'color:#ff6b6b' : 'color:#ddd';
              content += `<div class="choice-card undead-retrieve-${j}" id="undead-${j}" onclick="selectUndeadRetrieveMulti(${j}, ${retrieveCount})">
                <div class="card-name" style="font-size:20px;${colorStyle}">${c.suit} ${RANK_NAMES[c.rank]}</div>
              </div>`;
            }
            content += '</div>';
            showModal(`💀 亡灵天灾${lvl>=2?' L2':''}`, content, [
              {text:'确认选择', cls:'btn-primary', action:() => {
                let selected = document.querySelectorAll('[class*="undead-retrieve-"].selected');
                let indices = Array.from(selected).map(el => parseInt(el.id.split('-').pop()));
                G.waitingForInput = false;
                closeModal();
                resolve(indices.length > 0 ? indices : [0]);
              }}
            ]);
          });
        } else {
          // AI: pick first N (random order from shuffle)
          chosenIndices = Array.from({length: retrieveCount}, (_, k) => k);
        }
        // Retrieve chosen cards, return rest to discard pile
        let chosenSet = new Set(chosenIndices);
        for (let ci of chosenIndices) {
          if (ci >= 0 && ci < retrieves.length) {
            p.hand.push(retrieves[ci]);
            addLog(`${p.name}「亡灵天灾${lvl>=2?'L2':''}」→ 回收${cardName(retrieves[ci])}`, 'result');
          }
        }
        for (let i = 0; i < retrieves.length; i++) {
          if (!chosenSet.has(i)) G.discardPile.push(retrieves[i]);
        }
      }
    }
    
    // --- revolver_swap (左轮置换) ---
    if (passive.id === 'revolver_swap') {
      let lvl = passive.level || 1;
      let topCard = drawFromDeck(1);
      if (topCard.length > 0) {
        let c = topCard[0];
        let red = isRed(c);
        addLog(`${p.name}「左轮置换${lvl>=2?'L2':''}」→ 判定：${cardName(c)}(${red?'🔴红':'⚫黑'})`, 'info');
        if (lvl >= 2) {
          if (red) {
            // L2 Red: steal 1 card from opponent with most hand cards
            let opponents = G.players.filter((_, i) => i !== idx && !G.players[i].eliminated);
            if (opponents.length > 0) {
              let mostHand = opponents.reduce((a,b) => a.hand.length >= b.hand.length ? a : b);
              if (mostHand.hand.length > 0) {
                let stolen = mostHand.hand.splice(Math.floor(Math.random() * mostHand.hand.length), 1)[0];
                p.hand.push(stolen);
                addLog(`→ L2红：夺${mostHand.name}的${cardName(stolen)}`, 'result');
              }
            }
          } else {
            p.chips += 2;
            addLog(`→ L2黑：+2💰`, 'result');
          }
        } else {
          if (red) {
            let cards = drawFromDeck(1);
            p.hand.push(...cards);
            if (cards.length > 0) addLog(`→ L1红：摸1张(${cardName(cards[0])})`, 'result');
          } else {
            addLog(`→ L1黑：无事发生`, 'info');
          }
        }
      }
    }
    
    // --- tactical_pocket L2: draw 1 skill per turn ---
    if (passive.id === 'tactical_pocket' && (passive.level || 1) >= 2) {
      let skills = drawSkills(1, false);
      if (skills.length > 0) {
        if (p.skills.length < p.skillLimit) {
          p.skills.push(skills[0]);
          addLog(`${p.name}「战术口袋L2」→ 获得技能「${skills[0].name}」`, 'result');
        } else {
          addLog(`${p.name}「战术口袋L2」→ 技能已满，未获得`, 'info');
        }
      }
    }
  }
  
  // Enforce hand limit after passive triggers (e.g., undead/tactical_pocket retrieves add to hand)
  await enforceHandLimit(idx);
  renderAll();
  
  await delay(400);
}

function triggerTaxLaw(skillUserIdx) {
  for (let i = 0; i < G.players.length; i++) {
    if (i === skillUserIdx) continue;
    let p = G.players[i];
    let taxPassive = p.passives.find(ps => ps.id === 'tax_law');
    if (taxPassive) {
      if (!G.taxLawTriggers[i]) G.taxLawTriggers[i] = 0;
      if (G.taxLawTriggers[i] < 3) {
        G.taxLawTriggers[i]++;
        let gain = taxPassive.level >= 2 ? 2 : 1;
        p.chips += gain;
        addLog(`${p.name}「严苛税法${taxPassive.level>=2?'L2':''}」→ 对手用技能→ +${gain}💰(${G.taxLawTriggers[i]}/3)`, 'info');
      }
    }
  }
}

// Aura hook: surcharge (加税令) — when opponent uses skill, steal chips
function triggerSurcharge(skillUserIdx) {
  for (let i = 0; i < G.players.length; i++) {
    if (i === skillUserIdx) continue;
    let auraOwner = G.players[i];
    if (auraOwner.surchargeActive && auraOwner.surchargeAmount > 0) {
      let user = G.players[skillUserIdx];
      let steal = Math.min(auraOwner.surchargeAmount, user.chips);
      if (steal > 0) {
        user.chips -= steal;
        auraOwner.chips += steal;
        addLog(`💸 ${auraOwner.name}「加税令」→ 夺${user.name} ${steal}💰`, 'info');
      }
    }
  }
}

// Aura hook: plague (瘟疫) — when opponent discards a card, steal chips
function triggerPlague(discarderIdx, discardCount) {
  for (let i = 0; i < G.players.length; i++) {
    if (i === discarderIdx) continue;
    let auraOwner = G.players[i];
    if (auraOwner.plagueActive && auraOwner.plagueStealAmount > 0) {
      let discarder = G.players[discarderIdx];
      let totalSteal = discardCount * auraOwner.plagueStealAmount;
      let steal = Math.min(totalSteal, discarder.chips);
      if (steal > 0) {
        discarder.chips -= steal;
        auraOwner.chips += steal;
        addLog(`🦠 ${auraOwner.name}「瘟疫」→ 夺${discarder.name} ${steal}💰（弃${discardCount}张×${auraOwner.plagueStealAmount}💰）`, 'info');
      }
    }
  }
}

function applyDarkRitualEffect(userIdx, sacrificedCard, level) {
  let user = G.players[userIdx];
  let handThreshold = level >= 2 ? 3 : 2;
  let forcedDiscCount = level >= 2 ? 2 : 1;
  
  // Check each opponent
  for (let i = 0; i < G.players.length; i++) {
    if (i === userIdx || G.players[i].eliminated || G.players[i].foldThisTurn) continue;
    let opp = G.players[i];
    if (opp.hand.length > handThreshold) {
      // Force opponent to discard
      for (let d = 0; d < forcedDiscCount && opp.hand.length > 0; d++) {
        let disc = opp.hand.splice(Math.floor(Math.random() * opp.hand.length), 1)[0];
        G.discardPile.push(disc);
        addLog(`→ ${opp.name}被迫弃${cardName(disc)}`, 'result');
      }
    }
  }
  addLog(`「黑暗仪式${level>=2?'L2':''}」弃${cardName(sacrificedCard)}→ 对手弃牌！`, 'result');
}

window.playerUseSkill = async function(skill) {
  let p = G.players[0];
  
  let isTrap = skill.type === 'trap';
  if (!isTrap && p.chips < skill.cost) {
    addLog('筹码不足，无法使用！', 'danger');
    return;
  }
  
  // P2-#9: Confirmation dialog
  let confirmed = await new Promise(resolve => {
    G.waitingForInput = true;
    showModal(
      `${isTrap?'🪤 布置陷阱':'⚡ 使用技能'}：${skill.name}`,
      `<p style="margin:8px 0">${skill.desc}</p><p>费用：${isTrap?'<span style="color:var(--orange)">触发时</span> '+skill.cost+'💰':'<span style="color:var(--gold)">'+skill.cost+'💰</span>'}</p>`,
      [
        {text:'确认', cls:'btn-primary', action:() => { G.waitingForInput = false; closeModal(); resolve(true); }},
        {text:'取消', cls:'btn-secondary', action:() => { G.waitingForInput = false; closeModal(); resolve(false); }}
      ]
    );
  });
  
  if (!confirmed) return;
  
  if (!isTrap) {
    p.chips -= skill.cost;
    G.skillFeeTotal += skill.cost;
    G.pot += skill.cost;
  }
  p.skills = p.skills.filter(s => s !== skill);
  G.skillDiscardPile.push(skill); // skill goes to discard pile after use
  G.usedSkills.delete(skill.id); // release uniqueness lock
  addLog(`你${isTrap?'布置':'使用'}「${skill.name}」${isTrap?'':'(-'+skill.cost+'💰)'}`, 'result');
  if (!isTrap) { triggerTaxLaw(0); triggerSurcharge(0); }
  
  // P2-#12: For filter/quick_load, let human choose
  if ((skill.id === 'filter' || skill.id === 'quick_load') && !isTrap) {
    await executePeekAndChoose(skill, 0);
  } else {
    await executeSkillEffect(skill, 0);
  }
  
  // Check traps triggered by skill use (技能使用时陷阱拦截)
  if (!isTrap) {
    await checkTrapsOnSkillUse(0, skill);
  }
  
  renderAll();
  renderActionBar();
};

// P2-#12: Peek cards from deck and let human choose which to take
async function executePeekAndChoose(skill, playerIdx) {
  let p = G.players[playerIdx];
  let peekCount = skill.id === 'filter' ? 3 : 3;
  let top = drawFromDeck(peekCount);
  
  if (top.length === 0) {
    addLog('牌库为空，无法检索', 'danger');
    return;
  }
  
  if (p.isHuman && top.length > 1) {
    // Let human choose
    let chosen = await new Promise(resolve => {
      G.waitingForInput = true;
      let content = `<p>检索到牌库顶${top.length}张，选择1张入手：</p><div class="cards-choice">`;
      for (let i = 0; i < top.length; i++) {
        let c = top[i];
        content += `<div class="choice-card" id="peek-${i}" onclick="selectPeekCard(${i})">
          <div class="card-name" style="font-size:20px;color:${isRed(c)?'#ff6b6b':'#ddd'}">${c.suit} ${RANK_NAMES[c.rank]}</div>
        </div>`;
      }
      content += '</div>';
      showModal('🔍 检索牌库', content, [
        {text:'确认选择', cls:'btn-primary', action:() => {
          let sel = document.querySelector('.choice-card.selected');
          G.waitingForInput = false;
          closeModal();
          if (!sel) resolve(null);
          else resolve(parseInt(sel.id.split('-')[1]));
        }},
        {text:'取消（全不要）', cls:'btn-secondary', action:() => {
          G.waitingForInput = false;
          closeModal();
          resolve(-1);
        }}
      ]);
    });
    
    if (chosen === null || chosen < 0) {
      // Put all back
      for (let c of top) G.discardPile.push(c);
      addLog(`你选择不拿任何牌`, 'action');
    } else {
      let picked = top.splice(chosen, 1)[0];
      p.hand.push(picked);
      for (let c of top) G.deck.push(c);
      G.deck = shuffle(G.deck);
      addLog(`→ 检索${peekCount}张，选${cardName(picked)}入手`, 'action');
    }
  }
  // After peek-and-choose, check if hand limit exceeded
  await enforceHandLimit(playerIdx);
}

window.playerCoverCards = async function() {
  let p = G.players[0];
  let selected = p.hand.filter(c => c._selected);
  
  if (selected.length === 0) return;
  
  let currentCover = p.coverCards.length;
  let newTotal = currentCover + selected.length;
  // All-in = selecting ALL remaining hand cards (may or may not reach target)
  let isAllIn = selected.length === p.hand.length && selected.length > 0;
  
  // Must meet or exceed coverTarget, OR go all-in with all remaining hand cards
  if (!isAllIn && newTotal < G.coverTarget) {
    addLog(`盖牌不足！需要至少${G.coverTarget}张（当前${currentCover}张 + 选${selected.length}张 = ${newTotal}张），请选更多或Fold`, 'danger');
    return;
  }
  
  G.anyoneCovered = true;
  
  // Append selected cards to existing coverCards (raise = add more on top)
  p.coverCards = [...p.coverCards, ...selected.map(c => c)];
  p.hand = p.hand.filter(c => !c._selected);
  G.totalCoverCount += selected.length;
  
  // Mark all-in if all hand cards are now covered and total < target
  if (p.hand.length === 0 && p.coverCards.length < G.coverTarget) {
    p.allInThisTurn = true;
  }
  
  // Check traps on cover (盖牌陷阱触发)
  await checkTrapsOnCover(0, p.coverCards.length);
  
  if (p.allInThisTurn) {
    addLog(`你 All-in！盖出全部${p.coverCards.length}张牌（不足目标，仍参与结算）`, 'result');
  } else if (currentCover > 0) {
    addLog(`你追加盖牌：${selected.map(c=>cardName(c)).join(' ')}（总计${p.coverCards.length}张）`, 'result');
  } else {
    addLog(`你盖出${selected.length}张牌：${selected.map(c=>cardName(c)).join(' ')}`, 'result');
  }
  
  renderAll();
  playerEndTurn();
};
