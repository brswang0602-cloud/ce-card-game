async function aiAction(idx) {
  let p = G.players[idx];
  let profile = p.aiProfile;
  
  // AI: use cash out if available and hand is large (discard lowest card)
  let cashOutPassive = p.passives.find(ps => ps.id === 'cash_out');
  if (cashOutPassive && !p._cashOutUsed && p.hand.length > 3 && Math.random() < 0.4) {
    let gain = cashOutPassive.level >= 2 ? 5 : 3;
    let sortedByRank = [...p.hand].sort((a,b) => a.rank - b.rank);
    let disc = sortedByRank[0]; // discard lowest
    p.hand = p.hand.filter(c => c !== disc);
    G.discardPile.push(disc);
    p.chips += gain;
    p._cashOutUsed = true;
    addLog(`${p.name}「紧急变现${cashOutPassive.level>=2?'L2':''}」弃${cardName(disc)}→ +${gain}💰`, 'action');
  }
  
  // AI: use gold trade if available and chips > 10
  let goldTradePassive = p.passives.find(ps => ps.id === 'gold_trade');
  if (goldTradePassive && !p._goldTradeUsed && p.chips >= 5 && Math.random() < 0.5) {
    let lvl = goldTradePassive.level || 1;
    let cost = lvl >= 2 ? 2 : 1;
    let drawCount = lvl >= 2 ? 2 : 1;
    p.chips -= cost;
    let cards = drawFromDeck(drawCount);
    p.hand.push(...cards);
    p._goldTradeUsed = true;
    addLog(`${p.name}「金权交易${lvl>=2?'L2':''}」-${cost}💰→摸${drawCount}张`, 'action');
  }
  
  // AI: use dark ritual if available and hand is small
  let darkRitualPassive = p.passives.find(ps => ps.id === 'dark_ritual');
  if (darkRitualPassive && !p._darkRitualUsed && p.hand.length > 0 && Math.random() < 0.3) {
    let lvl = darkRitualPassive.level || 1;
    let disc = p.hand.shift();
    G.discardPile.push(disc);
    p._darkRitualUsed = true;
    applyDarkRitualEffect(idx, disc, lvl);
  }
  
  // === Enhanced AI: use skills with strategic probability ===
  // Evaluate current hand strength for decision making
  let preHand = evaluateHand([...p.hand, ...G.publicCards.filter(pc => !pc.covered || pc.owner === idx).map(pc => pc.card)]);
  let activeTrapsOnField = G.traps.filter(t => !t.triggered && !t.disabled && t.ownerIdx !== idx).length;
  
  // Sort skills by priority: draw cards > economy > scout > attack > trap
  let skillPriority = [];
  for (let i = 0; i < p.skills.length; i++) {
    let skill = p.skills[i];
    let priority = 0;
    let isTrap = skill.type === 'trap';
    
    if (isTrap) {
      // Traps: higher priority when opponents are strong
      let enemyStrength = G.players.filter((_,j) => j !== idx && !G.players[j].eliminated)
        .map(e => evaluateHand([...e.hand, ...G.publicCards.filter(pc => !pc.covered || pc.owner === j).map(pc => pc.card)]).rank)
        .reduce((a,b) => Math.max(a,b), 0);
      priority = 50 + enemyStrength * 10; // stronger enemies = more traps
      if (activeTrapsOnField >= 2) priority -= 30; // enough traps already
    } else if (isDrawSkill(skill)) {
      priority = 100 - preHand.rank * 15; // weaker hand = more draw
      if (p.hand.length <= 2) priority += 30; //急需补牌
    } else if (skill.tag && skill.tag.includes('💰')) {
      priority = 80 - p.chips; // less chips = more economy
      if (p.chips < 5) priority += 20;
    } else if (skill.tag && skill.tag.includes('👁')) {
      priority = profile.style === 'analytical' ? 70 : 40;
    } else if (skill.tag && skill.tag.includes('🔥')) {
      priority = 40 + preHand.rank * 10; // stronger hand = more attack
    } else {
      priority = 50; // default
    }
    
    skillPriority.push({idx: i, skill, priority, isTrap});
  }
  
  // Sort by priority (highest first)
  skillPriority.sort((a,b) => b.priority - a.priority);
  
  for (let sp of skillPriority) {
    let {skill, isTrap} = sp;
    let baseUseProb = isTrap ? 0.2 : 0.4;
    
    // Adjust by profile
    if (profile.style === 'aggressive') baseUseProb += 0.15;
    if (profile.style === 'analytical') baseUseProb += 0.1;
    if (profile.style === 'risky') baseUseProb += 0.1;
    if (profile.style === 'social') baseUseProb -= 0.1;
    
    // Adjust by priority (scale to 0-1)
    let adjustedProb = Math.min(0.9, Math.max(0.05, baseUseProb * (sp.priority / 60)));
    
    let canAfford = isTrap || p.chips >= skill.cost;
    if (canAfford && Math.random() < adjustedProb) {
      if (!isTrap) {
        p.chips -= skill.cost;
        G.skillFeeTotal += skill.cost;
        G.pot += skill.cost;
      }
      let removedIdx = p.skills.findIndex(s => s === skill);
      if (removedIdx >= 0) {
        let removedSkill = p.skills.splice(removedIdx, 1)[0];
        G.skillDiscardPile.push(removedSkill);
        G.usedSkills.delete(removedSkill.id);
        
        addLog(`${p.name} ${isTrap?'布置':'使用'}「${skill.name}」${isTrap?'':'(-'+skill.cost+'💰)'}`, 'action');
        if (!isTrap) { triggerTaxLaw(idx); triggerSurcharge(idx); }
        await executeSkillEffect(skill, idx);
        
        if (!isTrap) {
          await checkTrapsOnSkillUse(idx, skill);
        }
        
        renderAll();
        await delay(500);
      }
    }
  }
  
  // === AI Cover/Fold/Check Decision ===
  let allCards = [...p.hand, ...G.publicCards.filter(pc => !pc.covered || pc.owner === idx).map(pc => pc.card)];
  let hand = evaluateHand(allCards);
  
  // If no one has covered yet, AI can choose to Check (pass)
  if (!G.anyoneCovered) {
    let checkProb = 0.3; // base 30% chance to check
    if (hand.rank <= 1) checkProb = 0.6; // weak hand → more likely to check
    if (profile.style === 'analytical') checkProb += 0.1; // analytical players check more
    if (profile.style === 'risky') checkProb -= 0.1; // risky players check less
    
    if (Math.random() < checkProb) {
      p.checkedThisTurn = true;
      addLog(`${p.name} 选择过牌（Check）`, 'action');
      return;
    }
  }
  
  // Decision: cover or fold?
  let coverProb = 0.7;
  if (profile.style === 'risky') coverProb = 0.9;
  if (profile.style === 'analytical') coverProb = hand.rank >= 2 ? 0.9 : 0.4;
  if (p.chips < 5) coverProb = 0.85;
  
  // If target is high and hand is weak, more likely to fold
  if (G.coverTarget >= 2 && hand.rank <= 1) coverProb -= 0.3;
  
  if (Math.random() > coverProb) {
    p.foldThisTurn = true;
    G.foldPlayers.add(idx);
    disablePlayerTraps(idx);
    addLog(`${p.name} 选择 Fold`, 'action');
    return;
  }
  
  // Determine how many NEW cards to cover
  // RULE: total (existing + new) must >= coverTarget. Cannot cover fewer.
  let alreadyCovered = p.coverCards.length;
  let needMore = G.coverTarget - alreadyCovered; // how many more to reach target
  
  // Case 1: Already met target (追盖/加注) — must raise or fold, no "call" option
  if (alreadyCovered >= G.coverTarget) {
    // Must cover at least 1 more to raise, or fold
    if (hand.rank >= 3 && p.hand.length >= 1 && Math.random() < 0.6) {
      numCover = 1; // raise by 1
    } else if (hand.rank >= 2 && p.hand.length >= 1 && Math.random() < 0.3) {
      numCover = 1; // raise by 1 with decent hand
    } else {
      // Fold — can't or won't raise
      p.foldThisTurn = true;
      G.foldPlayers.add(idx);
      disablePlayerTraps(idx);
      addLog(`${p.name} 无法加注，选择 Fold`, 'action');
      return;
    }
  }
  // Case 2: Haven't met target yet — must reach it, all-in, or fold
  else if (p.hand.length >= needMore) {
    // Can meet the target
    numCover = needMore;
    // Good hand → consider raising
    if (hand.rank >= 3 && p.hand.length > needMore && Math.random() < 0.4) {
      numCover = Math.min(needMore + 1, p.hand.length);
    }
  }
  // Case 3: Hand too small to reach target
  else {
    if (hand.rank >= 2 || Math.random() < 0.5) {
      numCover = p.hand.length; // all-in with whatever we have
    } else {
      p.foldThisTurn = true;
      G.foldPlayers.add(idx);
      disablePlayerTraps(idx);
      addLog(`${p.name} 手牌不足，选择 Fold`, 'action');
      return;
    }
  }
  
  // Risky players might go all-in
  if (profile.style === 'risky' && p.hand.length <= 3 && Math.random() < 0.3) {
    numCover = p.hand.length;
  }
  
  numCover = Math.max(1, Math.min(numCover, p.hand.length));
  let sortedHand = [...p.hand].sort((a,b) => b.rank - a.rank);
  let coverCards = sortedHand.slice(0, numCover);
  
  G.anyoneCovered = true;
  // Append to existing coverCards (raise = add more on top)
  p.coverCards = [...p.coverCards, ...coverCards];
  p.hand = p.hand.filter(c => !coverCards.includes(c));
  G.totalCoverCount += coverCards.length;
  
  // Mark all-in if all hand cards are now covered and total < target
  if (p.hand.length === 0 && p.coverCards.length < G.coverTarget) {
    p.allInThisTurn = true;
    addLog(`${p.name} All-in！盖出全部${p.coverCards.length}张（不足目标，仍参与结算）`, 'action');
  } else if (p.coverCards.length > coverCards.length) {
    addLog(`${p.name} 追加${coverCards.length}张盖牌（总计${p.coverCards.length}张）`, 'action');
  } else {
    addLog(`${p.name} 盖出${coverCards.length}张牌`, 'action');
  }
  
  // Check traps on cover (盖牌陷阱触发)
  await checkTrapsOnCover(idx, p.coverCards.length);
  
  renderAll();
}

async function doShowdown() {
  G.phase = 'showdown';
  addLog('S9 结算·亮牌', 'phase');
  
  let potDetail = {...G.potDetail};
  potDetail.pubCards = G.publicCards.filter(pc => !pc.covered).length;
  potDetail.coverCards = G.totalCoverCount;
  potDetail.skillFee = G.skillFeeTotal;
  
  // Evaluate each non-folded player
  let contestants = [];
  for (let i = 0; i < G.players.length; i++) {
    if (G.foldPlayers.has(i)) continue;
    let p = G.players[i];
    
    // P1-#7: fog cover cards only visible to owner
    let fogCoveredCards = G.publicCards.filter(pc => pc.covered && pc.owner === i).map(pc => pc.card);
    let available = [
      ...p.coverCards,
      ...G.publicCards.filter(pc => 
        !pc.covered || pc.owner === i
      ).map(pc => pc.card)
    ];
    
    // Arbiter/Necro resonance: extra cover cards (add after initial evaluation for display)
    let extraResonanceCards = p._resonanceExtraCards || [];
    if (extraResonanceCards.length > 0) {
      available = [...available, ...extraResonanceCards];
    }
    
    // Fog L2: covered cards in public pool act as wild suit
    let hasFogL2 = p.passives.some(ps => ps.id === 'fog' && ps.level >= 2);
    let result;
    let fogUsed = false;
    if (hasFogL2 && fogCoveredCards.length > 0) {
      result = evaluateHandWithFogWild(available, fogCoveredCards.length);
      fogUsed = !!result._fogUsed;
      addLog(`🌫️ ${p.name}「迷雾降临L2」→ 公共池盖牌花色万能！`, 'result');
    } else {
      result = evaluateHand(available);
    }
    contestants.push({idx: i, player: p, result, cards: available, originalCards: p.coverCards, extraCards: extraResonanceCards, fogUsed});
    
    let extraStr = extraResonanceCards.length > 0 ? ` + 共鸣额外${extraResonanceCards.map(c=>cardName(c)).join(' ')}` : '';
    let fogStr = fogUsed ? ' [🌫️花色万能]' : '';
    addLog(`${p.name}：${result.name}${fogStr} (${p.coverCards.map(c=>cardName(c)).join(' ')}${extraStr} + 可见公共牌)`, 'info');
  }
  
  // Sort by hand rank
  contestants.sort((a,b) => compareHands(b.result, a.result));
  
  let winner = contestants[0];
  let tied = contestants.filter(c => compareHands(c.result, winner.result) === 0);
  
  // === DESTINY REVERSE TRAP: losers with destiny_reverse trap trigger ===
  let destinyTriggered = false;
  for (let c of contestants) {
    if (c === winner || tied.includes(c)) continue;
    let destinyResult = await checkTrapsOnShowdownLose(c.idx);
    if (destinyResult) destinyTriggered = true;
    // If destiny_reverse added extra cover cards, attach them
    let p = c.player;
    if (p._destinyExtraCover) {
      c.extraCards = [...(c.extraCards || []), ...p._destinyExtraCover];
      c.cards = [...c.cards, ...p._destinyExtraCover];
      delete p._destinyExtraCover;
    }
  }
  
  // === RESONANCE RETRY: losers get a chance to use their resonance ===
  let resonanceRetried = false;
  for (let c of contestants) {
    if (tied.includes(c)) continue; // winner/tied don't need resonance
    let p = c.player;
    let res = p.resonance;
    if (!res) continue;
    
    let retryUsed = false;
    
    if (res.school === 'tide') {
      // Tide: free retry — flip 2(L1) or 4(L2) new public cards
      let flipCount = res.level >= 2 ? 4 : 2;
      if (G.deck.length >= flipCount) {
        let newCards = drawFromDeck(flipCount);
        for (let nc of newCards) {
          G.publicCards.push({card: nc, frozen: false, covered: false, owner: -1});
        }
        addLog(`🌊 ${p.name}「${res.name}」→ 翻开${flipCount}张新公共牌：${newCards.map(card=>cardName(card)).join(' ')}`, 'result');
        retryUsed = true;
        resonanceRetried = true;
        
        // Trigger gunner resonance on newly revealed red cards
        for (let nc of newCards) {
          if (isRed(nc)) {
            triggerGunnerResonance(c.idx, nc);
          }
        }
      }
    }
    else if (res.school === 'arbiter') {
      // Arbiter: pay chips to draw extra cover cards
      let cost = res.level >= 2 ? 6 : 4;
      let drawCount = res.level >= 2 ? 2 : 1;
      if (p.chips >= cost && G.deck.length >= drawCount) {
        let doIt = false;
        if (p.isHuman) {
          doIt = await new Promise(resolve => {
            G.waitingForInput = true;
            showModal(`⚖️ ${res.name}`, 
              `<p>你输了本回合，是否使用「${res.name}」？</p><p>支付 <strong>${cost}💰</strong>，摸${drawCount}张作为额外盖牌参与比牌</p><p>你的筹码：${p.chips}💰</p>`,
              [
                {text:'跳过', cls:'btn-secondary', action:()=>{G.waitingForInput=false;closeModal();resolve(false);}},
                {text:`使用 (-${cost}💰)`, cls:'btn-primary', action:()=>{G.waitingForInput=false;closeModal();resolve(true);}}
              ]
            );
          });
        } else {
          // AI: use if chips >= 15 and hand was decent
          doIt = p.chips >= 15 && c.result.rank >= 2;
        }
        if (doIt) {
          p.chips -= cost;
          let extraCards = drawFromDeck(drawCount);
          p._resonanceExtraCards = extraCards;
          addLog(`⚖️ ${p.name}「${res.name}」→ -${cost}💰，额外盖牌：${extraCards.map(card=>cardName(card)).join(' ')}`, 'result');
          retryUsed = true;
          resonanceRetried = true;
        }
      }
    }
    else if (res.school === 'necro') {
      // Necro: pay chips to get random cards from discard pile
      let cost = res.level >= 2 ? 2 : 1;
      let drawCount = res.level >= 2 ? 2 : 1;
      if (p.chips >= cost && G.discardPile.length >= drawCount) {
        let doIt = false;
        if (p.isHuman) {
          doIt = await new Promise(resolve => {
            G.waitingForInput = true;
            showModal(`☠️ ${res.name}`, 
              `<p>你输了本回合，是否使用「${res.name}」？</p><p>支付 <strong>${cost}💰</strong>，从弃牌堆随机${drawCount}张作为额外盖牌</p><p>弃牌堆：${G.discardPile.length}张 | 你的筹码：${p.chips}💰</p>`,
              [
                {text:'跳过', cls:'btn-secondary', action:()=>{G.waitingForInput=false;closeModal();resolve(false);}},
                {text:`使用 (-${cost}💰)`, cls:'btn-primary', action:()=>{G.waitingForInput=false;closeModal();resolve(true);}}
              ]
            );
          });
        } else {
          doIt = p.chips >= 10 && c.result.rank >= 2;
        }
        if (doIt) {
          p.chips -= cost;
          let shuffled = shuffle([...G.discardPile]);
          let extraCards = shuffled.splice(0, drawCount);
          for (let ec of extraCards) {
            let idx = G.discardPile.indexOf(ec);
            if (idx >= 0) G.discardPile.splice(idx, 1);
          }
          p._resonanceExtraCards = extraCards;
          addLog(`☠️ ${p.name}「${res.name}」→ -${cost}💰，弃牌堆额外牌：${extraCards.map(card=>cardName(card)).join(' ')}`, 'result');
          retryUsed = true;
          resonanceRetried = true;
        }
      }
    }
  }
  
  // If any resonance was triggered, re-evaluate
  if (resonanceRetried) {
    addLog('🔄 共鸣触发，重新判定...', 'phase');
    await delay(600);
    
    // Update potDetail with new public cards
    potDetail.pubCards = G.publicCards.filter(pc => !pc.covered).length;
    
    // Re-evaluate contestants
    for (let c of contestants) {
      let p = c.player;
      let extraResonanceCards = p._resonanceExtraCards || [];
      let available = [
        ...p.coverCards,
        ...G.publicCards.filter(pc => 
          !pc.covered || pc.owner === c.idx
        ).map(pc => pc.card)
      ];
      if (extraResonanceCards.length > 0) {
        available = [...available, ...extraResonanceCards];
      }
      // Fog L2: apply wild suit on re-evaluation too
      let fogCoveredCards = G.publicCards.filter(pc => pc.covered && pc.owner === c.idx).map(pc => pc.card);
      let hasFogL2 = p.passives.some(ps => ps.id === 'fog' && ps.level >= 2);
      let result;
      let fogUsed = false;
      if (hasFogL2 && fogCoveredCards.length > 0) {
        result = evaluateHandWithFogWild(available, fogCoveredCards.length);
        fogUsed = !!result._fogUsed;
      } else {
        result = evaluateHand(available);
      }
      c.result = result;
      c.cards = available;
      c.extraCards = extraResonanceCards;
      c.fogUsed = fogUsed;
      
      let extraStr = extraResonanceCards.length > 0 ? ` + 共鸣额外${extraResonanceCards.map(card=>cardName(card)).join(' ')}` : '';
      let fogStr = fogUsed ? ' [🌫️花色万能]' : '';
      addLog(`${p.name} 重判：${result.name}${fogStr}${extraStr}`, 'info');
    }
    
    // Re-sort
    contestants.sort((a,b) => compareHands(b.result, a.result));
    winner = contestants[0];
    tied = contestants.filter(c => compareHands(c.result, winner.result) === 0);
    
    renderAll();
    await delay(500);
  }
  
  let bonus = winner.result.bonus;
  potDetail.bonus = bonus;
  
  // Pot calculation depends on stage
  let totalPot;
  
  if (G.stage === 4) {
    let chipPart = G.potDetail.ante + G.skillFeeTotal + G.trapFeeTotal;
    let sysPart = potDetail.pubCards + potDetail.coverCards + bonus;
    
    potDetail.chipPart = chipPart;
    potDetail.sysPart = sysPart;
    totalPot = chipPart + sysPart;
    
    // DJ: Fold players also suffer system damage
    let foldeds = G.players.filter((p, i) => G.foldPlayers.has(i) && !p.eliminated);
    for (let folded of foldeds) {
      let foldSysDmg = potDetailForFoldSysDamage(folded);
      if (foldSysDmg > 0) {
        folded.chips -= foldSysDmg;
        addLog(`⚡ ${folded.name} Fold→ 系统加成伤害 -${foldSysDmg}💰`, 'danger');
      }
    }
    
    if (tied.length === 1 && contestants.length > 1) {
      winner.player.chips += chipPart;
      let loser = contestants.find(c => c !== winner);
      if (loser) {
        loser.player.chips -= sysPart;
        addLog(`💰 DJ底池结算：`, 'phase');
        addLog(`  筹码部分 = 双方底注${G.potDetail.ante} + 技能费${G.skillFeeTotal} + 陷阱费${G.trapFeeTotal} = ${chipPart}💰`, 'info');
        addLog(`  系统部分 = 公共牌${potDetail.pubCards} + 盖牌${potDetail.coverCards} + 牌型加成+${bonus} = ${sysPart}💰`, 'info');
        addLog(`🏆 ${winner.player.name} 获胜（${winner.result.name}）→ 获得 +${chipPart}💰`, 'result');
        addLog(`→ ${loser.player.name} 失去 -${sysPart}💰`, 'danger');
      }
    } else if (contestants.length === 1) {
      winner.player.chips += chipPart;
      addLog(`💰 DJ底池结算：筹码部分 = ${chipPart}💰`, 'phase');
      addLog(`🏆 ${winner.player.name} 无对手盖牌，+${chipPart}💰`, 'result');
    } else {
      let share = Math.floor(chipPart / tied.length);
      let remainder = chipPart - share * tied.length;
      for (let t of tied) t.player.chips += share;
      tied.sort((a, b) => a.idx - b.idx);
      if (remainder > 0) tied[0].player.chips += remainder;
      addLog(`平局！各+${share}💰`, 'result');
    }
  } else {
    totalPot = G.ante + potDetail.pubCards + potDetail.coverCards + G.skillFeeTotal + G.trapFeeTotal + bonus;
    
    if (tied.length === 1) {
      if (contestants.length === 1) {
        totalPot = G.ante + potDetail.pubCards + potDetail.coverCards + G.skillFeeTotal + G.trapFeeTotal;
        winner.player.chips += totalPot;
        addLog(`🏆 ${winner.player.name} 获胜（${winner.result.name}）→ +${totalPot}💰`, 'result');
      } else {
        winner.player.chips += totalPot;
        addLog(`🏆 ${winner.player.name} 获胜（${winner.result.name}，加成+${bonus}💰）→ +${totalPot}💰`, 'result');
      }
    } else {
      let share = Math.floor(totalPot / tied.length);
      let remainder = totalPot - share * tied.length;
      for (let t of tied) t.player.chips += share;
      tied.sort((a, b) => a.idx - b.idx);
      if (remainder > 0) {
        tied[0].player.chips += remainder;
        addLog(`平局！${tied.map(t=>t.player.name).join('、')} 各+${share}💰，${tied[0].player.name}先手多+${remainder}💰`, 'result');
      } else {
        addLog(`平局！${tied.map(t=>t.player.name).join('、')} 各+${share}💰`, 'result');
      }
    }
  }
  
  // Necro L2 resonance: if resonance user won, they draw 1 extra card next turn
  for (let c of contestants) {
    if (c === winner || tied.includes(c)) {
      if (c.player.resonance && c.player.resonance.school === 'necro' && c.player.resonance.level >= 2) {
        c.player._necroResonanceBonus = true; // flag for next turn's draw phase
        addLog(`☠️ ${c.player.name}「亡者加护」→ 下回合多摸1张`, 'result');
      }
    }
  }
  
  // Bounty hunter passive: winners gain extra chips on showdown win
  for (let c of contestants) {
    if (c === winner || tied.includes(c)) {
      let bhPassive = c.player.passives.find(ps => ps.id === 'bounty_hunter');
      if (bhPassive) {
        let lvl = bhPassive.level || 1;
        let richest = G.players.reduce((a,b) => a.chips >= b.chips ? a : b);
        let isRichestDefeated = contestants.some(op => op !== c && op.player === richest);
        if (lvl >= 2) {
          let gain = isRichestDefeated ? 5 : 4;
          if (isRichestDefeated) {
            let steal = Math.min(gain, richest.chips);
            richest.chips -= steal;
            c.player.chips += steal;
            addLog(`🎯 ${c.player.name}「赏金猎人L2」击败首富→ 夺${steal}💰`, 'result');
          } else {
            c.player.chips += gain;
            addLog(`🎯 ${c.player.name}「赏金猎人L2」→ +${gain}💰`, 'result');
          }
        } else {
          let gain = isRichestDefeated ? 3 : 2;
          if (isRichestDefeated) {
            let steal = Math.min(gain, richest.chips);
            richest.chips -= steal;
            c.player.chips += steal;
            addLog(`🎯 ${c.player.name}「赏金猎人」击败首富→ 夺${steal}💰`, 'result');
          } else {
            c.player.chips += gain;
            addLog(`🎯 ${c.player.name}「赏金猎人」→ +${gain}💰`, 'result');
          }
        }
      }
    }
  }
  
  G.pot = totalPot;
  G.potDetail = potDetail;
  renderAll();
  
  await delay(1000);
  
  // Show result modal
  let contestantMap = {};
  for (let c of contestants) contestantMap[c.idx] = c;
  
  let resultHTML = '<div style="margin:12px 0">';
  for (let i = 0; i < G.players.length; i++) {
    let p = G.players[i];
    if (p.eliminated) continue;
    
    let isFolded = G.foldPlayers.has(i);
    let c = contestantMap[i];
    let isWinner = c === winner;
    let isTied = c && tied.includes(c);
    
    if (isFolded) {
      let foldDmgStr = '';
      if (G.stage === 4) {
        let foldSysDmg = potDetailForFoldSysDamage(p);
        if (foldSysDmg > 0) {
          foldDmgStr = `<span style="color:#e74c3c;font-size:11px;margin-left:8px">系统伤害 -${foldSysDmg}💰</span>`;
        }
      }
      resultHTML += `<div style="padding:8px;margin:4px 0;border-radius:6px;background:rgba(255,255,255,0.02);border:1px solid #333;opacity:0.6">
        <span style="font-weight:bold">${p.name}</span>
        <span style="color:#e74c3c;font-size:12px;margin-left:8px">Fold</span>
        ${foldDmgStr}
      </div>`;
    } else {
      let bestCardsStr = c.cards.length > 0 
        ? `<div style="color:#999;font-size:11px;margin-top:3px;padding-left:12px">最佳牌型：${c.result.best5.map(card => cardName(card)).join('、')}</div>`
        : '';
      let resStr = c.extraCards && c.extraCards.length > 0
        ? `<span style="color:#9b59b6;font-size:11px;margin-left:8px">✨共鸣额外：${c.extraCards.map(card=>cardName(card)).join(' ')}</span>`
        : '';
      let fogStr = c.fogUsed
        ? `<span style="color:#3498db;font-size:11px;margin-left:8px">🌫️迷雾万能花色生效</span>`
        : '';
      resultHTML += `<div style="padding:8px;margin:4px 0;border-radius:6px;background:${isWinner?'rgba(240,192,64,0.15)':'rgba(255,255,255,0.03)'};border:1px solid ${isWinner?'#f0c040':'#333'}">
        <span style="font-weight:bold;${isWinner?'color:#f0c040':''}">${isWinner?'🏆 ':''}${c.player.name}</span>
        <span style="color:#6ec6ff;font-size:12px;margin-left:8px">${c.result.name}</span>
        <span style="color:#888;font-size:11px;margin-left:8px">盖牌：${c.player.coverCards.map(card=>cardName(card)).join(' ')}</span>
        ${resStr}${fogStr}
        ${isTied && tied.length > 1 ? `<span style="color:#f0c040;font-size:11px;margin-left:8px">平局</span>` : ''}
        ${bestCardsStr}
      </div>`;
    }
  }
  resultHTML += `<div style="margin-top:12px;padding:8px;background:rgba(240,192,64,0.08);border-radius:6px">`;
  // Check if any contestant used fog L2
  let anyFogUsed = contestants.some(c => c.fogUsed);
  if (G.stage === 4) {
    // DJ settlement: split model with full detail per rules section 9
    resultHTML += `💰 <strong>DJ底池结算：</strong><br>`;
    resultHTML += `<span style="color:#27ae60">筹码部分</span> = 双方底注${potDetail.ante} + 技能费${potDetail.skillFee||0} + 陷阱费${G.trapFeeTotal||0} = <strong style="color:#27ae60">${potDetail.chipPart}💰</strong>（→赢家）<br>`;
    resultHTML += `<span style="color:#e74c3c">系统部分</span> = 公共牌${potDetail.pubCards} + 盖牌${potDetail.coverCards} + 牌型加成+${bonus} = <strong style="color:#e74c3c">${potDetail.sysPart}💰</strong>（→败者/Fold扣除）`;
    if (anyFogUsed) {
      resultHTML += `<br><span style="color:#3498db">🌫️ 迷雾降临L2花色万能已生效</span>`;
    }
  } else {
    // Multi-player settlement
    let trapStr = G.trapFeeTotal > 0 ? ` + 陷阱费${G.trapFeeTotal}` : '';
    resultHTML += `💰 底池明细：底注${potDetail.ante} + 公共牌${potDetail.pubCards} + 盖牌${potDetail.coverCards} + 技能费${potDetail.skillFee||0}${trapStr} + 牌型加成+${bonus} = <strong>${totalPot}💰</strong>`;
    if (anyFogUsed) {
      resultHTML += `<br><span style="color:#3498db">🌫️ 迷雾降临L2花色万能已生效</span>`;
    }
  }
  if (resonanceRetried) {
    resultHTML += `<br><span style="color:#9b59b6">✨ 共鸣效果触发后重新判定</span>`;
  }
  resultHTML += `</div></div>`;
  
  G.waitingForInput = true;
  await new Promise(resolve => {
    showModal('♠ 结算结果', resultHTML, [
      {text:'继续', cls:'btn-primary', action:()=>{closeModal();G.waitingForInput=false;resolve();}}
    ]);
  });
  
  // Clear resonance extra cards after showdown
  for (let p of G.players) {
    delete p._resonanceExtraCards;
  }
}

async function executeSkillEffect(skill, playerIdx) {
  let p = G.players[playerIdx];
  
  switch(skill.id) {
    case 'force_supply': {
      let drawCount = skill.level >= 2 ? 3 : 2;
      let cards = drawFromDeck(drawCount);
      p.hand.push(...cards);
      addLog(`→ 摸${drawCount}张：${cards.map(c=>cardName(c)).join(' ')}`, 'action');
      // Give poorest 2 chips
      let poorest = G.players.reduce((a,b) => a.chips <= b.chips ? a : b);
      if (poorest !== p) {
        poorest.chips += 2;
        addLog(`→ ${poorest.name}+2💰（代价）`, 'action');
      }
      break;
    }
    case 'purify': {
      if (p.hand.length > 0) {

        let mostHand = opponents.reduce((a, b) => a.hand.length >= b.hand.length ? a : b);
        if (mostHand.hand.length > 0) {
          for (let i = 0; i < Math.min(stealCount, mostHand.hand.length); i++) {
            let stolen = mostHand.hand.splice(Math.floor(Math.random() * mostHand.hand.length), 1)[0];
            p.hand.push(stolen);
            addLog(`→ 从${mostHand.name}手中夺取${cardName(stolen)}`, 'action');
          }
          if (skill.level >= 2) { p.chips += 1; addLog(`→ +1💰`, 'action'); }
        }
      }
      break;
    }
    case 'equalize': {
      // Trap: when opponent draws extra card, force discard 1, gain 2 chips
      placeTrap(skill, playerIdx);
      break;
    }
    case 'common_benefit': {
      // Trap: when opponent gets buff, copy the same effect
      placeTrap(skill, playerIdx);
      break;
    }
    // ========== GUNNER: NEW L1 ==========
    case 'tactical_cal': {
      // Declare big(9-A)/small(2-8), reveal top 2(4), take matching
      let range;
      let revealCount = skill.level >= 2 ? 4 : 2;
      if (p.isHuman) {
        range = await new Promise(resolve => {
          showModal('🎯 战术校准', `<p>声明范围：</p>`, [
            {text: '大 (9~A)', cls: 'btn-primary', action: () => { resolve('big'); }},
            {text: '小 (2~8)', cls: 'btn-secondary', action: () => { resolve('small'); }}
          ]);
        });
      } else {
        let highCount = p.hand.filter(c => c.rank >= 9).length;
        range = highCount >= p.hand.length / 2 ? 'big' : 'small';
      }
      let top = drawFromDeck(revealCount);
      let taken = [];
      for (let c of top) {
        if (range === 'big' ? c.rank >= 9 : c.rank <= 8) {
          p.hand.push(c);
          taken.push(c);
        } else {
          G.discardPile.push(c);
        }
      }
      addLog(`→ 声明「${range === 'big' ? '大' : '小'}」，翻${top.map(c => cardName(c)).join(' ')}，入手${taken.map(c => cardName(c)).join(' ') || '无'}`, 'action');
      break;
    }
    case 'ap_round': {
      // Peek top 3(5), take all red cards, discard rest
      let peekCount = skill.level >= 2 ? 5 : 3;
      let top = drawFromDeck(peekCount);
      let taken = [];
      for (let c of top) {
        if (isRed(c)) {
          p.hand.push(c);
          taken.push(c);
        } else {
          G.discardPile.push(c);
        }
      }
      addLog(`→ 检索${peekCount}张，红色牌入手：${taken.map(c => cardName(c)).join(' ') || '无'}`, 'action');
      break;
    }
    case 'bulletproof': {
      // Trap: enemy skill on you, judge top card. Red: cancel + draw 1. Black: cancel only
      placeTrap(skill, playerIdx);
      break;
    }
    case 'deter_shot': {
      // Peek top 4(6), choose 2(3) to add as public cards
      let peekCount = skill.level >= 2 ? 6 : 4;
      let takeCount = skill.level >= 2 ? 3 : 2;
      let top = drawFromDeck(peekCount);
      if (top.length >= takeCount) {
        let best = top.sort((a, b) => b.rank - a.rank).slice(0, takeCount);
        for (let c of best) G.publicCards.push({card: c, frozen: false, covered: false});
        for (let c of top) if (!best.includes(c)) G.deck.push(c);
        G.deck = shuffle(G.deck);
        addLog(`→ 检索${peekCount}张，选${takeCount}张翻为公共牌：${best.map(c => cardName(c)).join(' ')}`, 'action');
        triggerWaterPressure('add');
      }
      break;
    }
    case 'suppression': {
      // Discard 1 card from most-hand opponent. If still more, steal 2(4) chips
      let chipSteal = skill.level >= 2 ? 4 : 2;
      let opponents = G.players.filter((_, i) => i !== playerIdx && !G.players[i].eliminated);
      if (opponents.length > 0) {
        let mostHand = opponents.reduce((a, b) => a.hand.length >= b.hand.length ? a : b);
        if (mostHand.hand.length > 0) {
          let disc = mostHand.hand.splice(Math.floor(Math.random() * mostHand.hand.length), 1)[0];
          G.discardPile.push(disc);
          addLog(`→ ${mostHand.name}被弃${cardName(disc)}`, 'action');
          if (mostHand.hand.length > p.hand.length && mostHand.chips > 0) {
            let take = Math.min(chipSteal, mostHand.chips);
            mostHand.chips -= take;
            p.chips += take;
            addLog(`→ ${mostHand.name}手牌仍多于你，额外夺${take}💰`, 'action');
          }
        }
      }
      break;
    }
    case 'destiny_reverse': {
      // Trap: on showdown loss, judge top card
      placeTrap(skill, playerIdx);
      break;
    }
    // ========== NECRO: NEW L1 ==========
    case 'mad_dig': {
      // Discard top 2(3) face-up to discard pile. If face cards found, retrieve more
      let topCount = skill.level >= 2 ? 3 : 2;
      let top = drawFromDeck(topCount);
      let hasFace = false;
      for (let c of top) {
        G.discardPile.push(c);
        if (c.rank >= 11) hasFace = true;
      }
      let retrieveCount = skill.level >= 2 ? (hasFace ? 3 : 2) : (hasFace ? 2 : 1);
      addLog(`→ 牌库顶${topCount}张(${top.map(c => cardName(c)).join(' ')})入弃牌堆，${hasFace ? '有人头牌' : '无人头牌'}，回收${retrieveCount}张`, 'action');
      if (G.discardPile.length >= retrieveCount) {
        if (p.isHuman) {
          // Human: show 3 cards from discard pile, player picks 1 each round
          await new Promise(resolve => {
            let remaining = retrieveCount;
            async function pickOne() {
              if (remaining <= 0 || G.discardPile.length === 0) { resolve(); return; }
              let showCount = Math.min(3, G.discardPile.length);
              let preview = G.discardPile.slice(0, showCount);
              let content = `<p>弃牌堆展示3张，选择1张回收（剩余${remaining}次）：</p>`;
              content += '<div class="cards-choice">';
              for (let i = 0; i < preview.length; i++) {
                content += `<div class="choice-card" id="dig-${i}" onclick="document.getElementById('modal').dataset.digChoice='${i}'">
                  <div class="card-name">${cardName(preview[i])}</div>
                </div>`;
              }
              content += '</div>';
              showModal('⛏️ 疯狂挖掘 — 选择回收', content, [
                {text: '确认', cls: 'btn-primary', action: async () => {
                  let choiceIdx = parseInt(document.getElementById('modal').dataset.digChoice || '0');
                  let picked = G.discardPile.splice(choiceIdx, 1)[0];
                  p.hand.push(picked);
                  addLog(`→ 回收：${cardName(picked)}`, 'action');
                  remaining--;
                  await delay(300);
                  pickOne();
                }}
              ]);
            }
            pickOne();
          });
        } else {
          // AI: take the highest rank cards
          for (let i = 0; i < retrieveCount && G.discardPile.length > 0; i++) {
            let best = G.discardPile.reduce((a, b, idx) => b.rank > a.rank ? {card: b, idx} : a, {card: G.discardPile[0], idx: 0});
            let retrieved = G.discardPile.splice(best.idx, 1)[0];
            p.hand.push(retrieved);
            addLog(`→ 回收：${cardName(retrieved)}`, 'action');
          }
        }
      }
      break;
    }
    case 'nether_gate': {
      // Destroy 1(2) public card, retrieve 1(2) from discard as new public
      let destroyCount = skill.level >= 2 ? 2 : 1;
      let retrieveCount = skill.level >= 2 ? 2 : 1;
      let peekDiscard = skill.level >= 2 ? 5 : 3;
      for (let i = 0; i < destroyCount && G.publicCards.length > 0; i++) {
        let destroyed = G.publicCards.shift();
        addLog(`→ 销毁公共牌${cardName(destroyed.card)}`, 'action');
        triggerWaterPressure('remove');
      }
      if (G.discardPile.length > 0) {
        let topN = G.discardPile.splice(0, Math.min(peekDiscard, G.discardPile.length));
        let sorted = topN.sort((a, b) => b.rank - a.rank);
        let taken = sorted.slice(0, retrieveCount);
        for (let c of taken) {
          G.publicCards.push({card: c, frozen: false, covered: false});
          addLog(`→ 回收${cardName(c)}为新公共牌`, 'action');
        }
        for (let c of topN) if (!taken.includes(c)) G.discardPile.push(c);
        triggerWaterPressure('add');
      }
      break;
    }
    case 'corpse_wall': {
      // Trap: on opponent cover, shuffle their cover with discard top 1, random return
      placeTrap(skill, playerIdx);
      break;
    }
    case 'plague': {
      // Aura: this round, when opponent discards, steal 2 chips per card
      if (!p.plagueActive) {
        p.plagueActive = true;
        p.plagueStealAmount = skill.level >= 2 ? 2 : 2; // both levels steal 2
        addLog(`→ 瘟疫激活：本回合对手每弃1张数字牌你夺${p.plagueStealAmount}💰`, 'action');
      }
      break;
    }
    case 'scapegoat': {
      // Trap: cancel enemy skill on you by discarding 1 card, gain 4 chips
      placeTrap(skill, playerIdx);
      break;
    }
    case 'corpse_craft': {
      // Discard N cards (N>=2 L1, N>=3 L2), draw N+1 (L1) or N+2 (L2). Temp hand limit bonus
      let minDiscard = skill.level >= 2 ? 3 : 2;
      let drawBonus = skill.level >= 2 ? 2 : 1;
      let handBonus = skill.level >= 2 ? 2 : 1;
      if (p.hand.length >= minDiscard) {
        await new Promise(resolve => {
          if (p.isHuman) {
            let content = `<p>弃N张牌(N≥${minDiscard})，摸N+${drawBonus}张。点击选择要弃的牌（至少${minDiscard}张），然后确认：</p>`;
            content += '<div class="cards-choice">';
            for (let i = 0; i < p.hand.length; i++) {
              let c = p.hand[i];
              content += `<div class="choice-card hand-limit-card" id="craft-${i}" onclick="toggleCraftCard(${i})">
                <div class="card-name">${cardName(c)}</div>
              </div>`;
            }
            content += '</div>';
            showModal('💀 尸骸拼凑', content, [
              {text: `确认弃牌`, cls: 'btn-primary', action: () => {
                let selected = [];
                for (let i = p.hand.length - 1; i >= 0; i--) {
                  let el = document.getElementById(`craft-${i}`);
                  if (el && el.classList.contains('selected')) {
                    selected.push(p.hand.splice(i, 1)[0]);
                  }
                }
                if (selected.length >= minDiscard) {
                  for (let c of selected) G.discardPile.push(c);
                  let drawCount = selected.length + drawBonus;
                  let cards = drawFromDeck(drawCount);
                  p.hand.push(...cards);
                  p.tempHandBonus = (p.tempHandBonus || 0) + handBonus;
                  addLog(`→ 弃${selected.length}张，摸${drawCount}张，手牌上限+${handBonus}`, 'action');
                }
                resolve();
              }}
            ]);
            window.toggleCraftCard = function(idx) {
              let el = document.getElementById(`craft-${idx}`);
              el.classList.toggle('selected');
              let count = document.querySelectorAll('.hand-limit-card.selected').length;
              addLog(`已选${count}张`, 'info');
            };
          } else {
            // AI: discard minDiscard lowest
            let sorted = [...p.hand].sort((a, b) => a.rank - b.rank);
            let toDiscard = sorted.slice(0, minDiscard);
            for (let c of toDiscard) {
              let idx = p.hand.indexOf(c);
              if (idx >= 0) p.hand.splice(idx, 1);
              G.discardPile.push(c);
            }
            let drawCount = toDiscard.length + drawBonus;
            let cards = drawFromDeck(drawCount);
            p.hand.push(...cards);
            p.tempHandBonus = (p.tempHandBonus || 0) + handBonus;
            addLog(`→ 弃${toDiscard.length}张，摸${drawCount}张，手牌上限+${handBonus}`, 'action');
            resolve();
          }
        });
      } else {
        addLog(`→ 手牌不足${minDiscard}张，无法发动尸骸拼凑`, 'info');
      }
      break;
    }
  }
  // After skill effect, check if hand/skill limit exceeded
  await enforceHandLimit(playerIdx);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

</script>
