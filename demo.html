<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡牌对决 — Phase 1 Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#e0e0e0; font-family:'Microsoft YaHei','PingFang SC',sans-serif; overflow-x:hidden; }
:root { --bg:#111; --card:#1a1a2e; --gold:#f0c040; --red:#e74c3c; --green:#27ae60; --blue:#3498db; --purple:#9b59b6; --orange:#e67e22; --gray:#555; --light:#ecf0f1; --dark:#0a0a0a; }

/* Layout */
#game { max-width:1200px; margin:0 auto; padding:10px; min-height:100vh; display:flex; flex-direction:column; }
#top-bar { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; background:var(--bg); border-radius:8px; margin-bottom:8px; border:1px solid #333; }
#top-bar .info { font-size:14px; color:#aaa; }
#top-bar .info span { color:var(--gold); font-weight:bold; }

#ai-players { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.ai-panel { flex:1; min-width:180px; background:var(--card); border-radius:8px; padding:10px; border:1px solid #333; position:relative; }
.ai-panel.active { border-color:var(--gold); box-shadow:0 0 10px rgba(240,192,64,0.3); }
.ai-panel.dealer { border-color:rgba(240,192,64,0.5); box-shadow:0 0 6px rgba(240,192,64,0.15); }
.ai-panel.folded { opacity:0.4; }
.ai-panel.eliminated { opacity:0.2; filter:grayscale(1); pointer-events:none; }
.ai-panel.eliminated::after { content:'💀'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:24px; }
.ai-panel .name { font-weight:bold; font-size:14px; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
.ai-panel .name .stars { color:#888; font-size:11px; }
.ai-panel .chips { color:var(--gold); font-size:13px; margin-bottom:4px; }
.ai-panel .hand-count { color:#888; font-size:11px; margin-bottom:4px; }
.ai-panel .passive { font-size:10px; color:var(--purple); background:rgba(155,89,182,0.15); padding:2px 6px; border-radius:4px; display:inline-block; margin:1px; }
.ai-panel .cover-cards { margin-top:6px; display:flex; gap:4px; flex-wrap:wrap; }
.cover-card { width:28px; height:40px; background:linear-gradient(135deg,#2c3e50,#34495e); border-radius:3px; border:1px solid #555; font-size:8px; display:flex; align-items:center; justify-content:center; color:#aaa; }
.cover-card.revealed { background:linear-gradient(135deg,#1a3a1a,#2a4a2a); border-color:var(--green); }

#public-area { background:var(--bg); border-radius:8px; padding:12px; margin-bottom:8px; border:1px solid #333; min-height:120px; }
#public-area .label { font-size:12px; color:#888; margin-bottom:8px; }
#public-cards { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.pub-card { width:55px; height:80px; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:16px; font-weight:bold; cursor:default; position:relative; }
.pub-card .suit { font-size:22px; }
.pub-card.frozen::after { content:'❄️'; position:absolute; top:-8px; right:-8px; font-size:14px; }
.pub-card.covered { background:linear-gradient(135deg,#2c3e50,#34495e)!important; border:1px dashed #555!important; }
.pub-card.covered .suit, .pub-card.covered .rank { color:#666!important; }

#pot-display { text-align:center; padding:8px; background:rgba(240,192,64,0.08); border-radius:6px; margin-bottom:8px; font-size:14px; }
#pot-display .pot-amount { color:var(--gold); font-size:20px; font-weight:bold; }

#player-area { background:var(--card); border-radius:8px; padding:12px; border:2px solid #444; margin-bottom:8px; }
#player-area.active { border-color:var(--gold); }
#player-area.dealer { border-color:rgba(240,192,64,0.5); box-shadow:0 0 6px rgba(240,192,64,0.15); }
#player-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
#player-header .name { font-weight:bold; font-size:16px; }
#player-header .chips { color:var(--gold); font-size:15px; }
#player-hand { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; min-height:80px; padding:8px 0; }
.hand-card { width:60px; height:88px; border-radius:6px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:18px; font-weight:bold; transition:all 0.2s; border:2px solid transparent; position:relative; }
.hand-card:hover { transform:translateY(-8px); }
.hand-card.selected { border-color:var(--gold); box-shadow:0 0 12px rgba(240,192,64,0.5); transform:translateY(-12px); }
.hand-card.red { background:linear-gradient(135deg,#8b0000,#b22222); color:#fff; }
.hand-card.black { background:linear-gradient(135deg,#1a1a3e,#2a2a5e); color:#fff; }

#skill-cards { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; min-height:50px; }
.skill-card { padding:6px 10px; background:rgba(52,152,219,0.15); border:1px solid var(--blue); border-radius:6px; font-size:11px; cursor:pointer; transition:all 0.2s; max-width:200px; }
.skill-card:hover { background:rgba(52,152,219,0.3); }
.skill-card.trap { border-color:var(--orange); background:rgba(230,126,34,0.15); }
.skill-card.trap:hover { background:rgba(230,126,34,0.3); }
.skill-card .cost { color:var(--gold); font-weight:bold; }
.skill-card .type-tag { font-size:9px; color:var(--orange); }

#action-bar { display:flex; gap:8px; justify-content:center; padding:12px; flex-wrap:wrap; }
.btn { padding:10px 24px; border:none; border-radius:6px; font-size:14px; font-weight:bold; cursor:pointer; transition:all 0.2s; }
.btn:hover { transform:translateY(-2px); }
.btn:disabled { opacity:0.3; cursor:not-allowed; transform:none; }
.btn-primary { background:var(--gold); color:#000; }
.btn-danger { background:var(--red); color:#fff; }
.btn-success { background:var(--green); color:#fff; }
.btn-secondary { background:#444; color:#ccc; }
.btn-info { background:var(--blue); color:#fff; }
.btn-purple { background:var(--purple); color:#fff; }

#log { background:#0d0d0d; border:1px solid #333; border-radius:8px; padding:10px; max-height:200px; overflow-y:auto; font-size:12px; line-height:1.6; }
#log .turn-label { color:var(--gold); font-weight:bold; }
#log .action { color:#aaa; }
#log .result { color:var(--green); }
#log .danger { color:var(--red); }
#log .info { color:var(--blue); }
#log .phase { color:var(--purple); font-weight:bold; }

/* Modal */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:100; transition:background 0.35s ease; pointer-events:auto; }
.modal-overlay.peekable.peek-dim { background:rgba(0,0,0,0.2); }
.modal { background:var(--card); border:1px solid #444; border-radius:12px; padding:24px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; transition:opacity 0.35s ease; }
.modal.peek-dim { opacity:0.15; }
.modal h2 { color:var(--gold); margin-bottom:12px; }
.modal p { margin-bottom:12px; line-height:1.6; }
.modal .cards-choice { display:flex; gap:10px; flex-wrap:wrap; margin:12px 0; }
.modal .choice-card { padding:12px; background:var(--bg); border:2px solid #444; border-radius:8px; cursor:pointer; transition:all 0.2s; min-width:140px; }
.modal .choice-card:hover { border-color:var(--gold); }
.modal .choice-card .card-name { font-weight:bold; color:var(--light); margin-bottom:4px; }
.modal .choice-card .card-desc { font-size:12px; color:#aaa; }
.modal .choice-card.selected { border-color:var(--gold); background:rgba(240,192,64,0.1); }

/* Start screen */
#start-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
#start-screen h1 { font-size:36px; color:var(--gold); margin-bottom:8px; text-shadow:0 0 20px rgba(240,192,64,0.3); }
#start-screen .subtitle { color:#888; font-size:16px; margin-bottom:30px; }
#start-screen .features { display:flex; gap:20px; margin-bottom:30px; flex-wrap:wrap; justify-content:center; }
#start-screen .feature { background:var(--card); border:1px solid #333; border-radius:8px; padding:16px; max-width:180px; }
#start-screen .feature .icon { font-size:28px; margin-bottom:8px; }
#start-screen .feature .title { font-weight:bold; margin-bottom:4px; }
#start-screen .feature .desc { font-size:11px; color:#888; }

/* Animations */
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeIn 0.3s ease; }
@keyframes pulse { 0%,100%{box-shadow:0 0 5px rgba(240,192,64,0.3)} 50%{box-shadow:0 0 15px rgba(240,192,64,0.6)} }
.pulse { animation:pulse 1.5s infinite; }
@keyframes reshuffleFlash { 
  0% { box-shadow:0 0 0 0 rgba(88,166,255,0.6); transform:scale(1); }
  50% { box-shadow:0 0 20px 8px rgba(88,166,255,0.3); transform:scale(1.08); }
  100% { box-shadow:0 0 0 0 rgba(88,166,255,0); transform:scale(1); }
}
@keyframes discardFly {
  0% { box-shadow:0 0 0 0 rgba(255,100,100,0.5); transform:scale(1); }
  50% { box-shadow:0 0 15px 5px rgba(255,100,100,0.2); transform:scale(1.06); }
  100% { box-shadow:0 0 0 0 rgba(255,100,100,0); transform:scale(1); }
}
.reshuffle-flash { animation:reshuffleFlash 0.8s ease-out; }
.discard-fly { animation:discardFly 0.5s ease-out; }
.reshuffle-banner {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(26,26,62,0.95); border:2px solid #58a6ff; border-radius:12px;
  padding:16px 32px; z-index:200; text-align:center; pointer-events:none;
  animation:reshuffleBannerAnim 1.2s ease-out forwards;
}
@keyframes reshuffleBannerAnim {
  0% { opacity:0; transform:translate(-50%,-50%) scale(0.7); }
  20% { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
  80% { opacity:1; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-50%) scale(0.95); }
}

/* Passives display */
.passive-badge { font-size:10px; padding:2px 8px; border-radius:10px; background:rgba(155,89,182,0.2); border:1px solid rgba(155,89,182,0.4); color:var(--purple); }
.passive-badge.level2 { background:rgba(240,192,64,0.25); border:1px solid rgba(240,192,64,0.6); color:var(--gold); }
.passive-level { font-size:8px; font-weight:bold; margin-left:2px; opacity:0.8; }
.passive-upgradable { cursor:pointer; animation: upgradable-pulse 2s ease-in-out infinite; }
@keyframes upgradable-pulse { 0%,100% { box-shadow: 0 0 4px rgba(240,192,64,0.3); } 50% { box-shadow: 0 0 10px rgba(240,192,64,0.7); } }

/* Resonance badge */
.resonance-badge { font-size:10px; color:#e0c3fc; background:rgba(155,89,182,0.25); border:1px solid rgba(155,89,182,0.6); padding:2px 6px; border-radius:4px; display:inline-block; margin:1px; animation: resonance-glow 3s ease-in-out infinite; }
@keyframes resonance-glow { 0%,100% { box-shadow: 0 0 4px rgba(155,89,182,0.3); } 50% { box-shadow: 0 0 12px rgba(155,89,182,0.7); } }
.resonance-badge.l2 { color:#f0c040; background:rgba(240,192,64,0.2); border-color:rgba(240,192,64,0.6); }

/* Deck & Discard Pile */
#deck-discard-bar { display:flex; justify-content:center; gap:40px; margin-bottom:8px; align-items:flex-start; }
.deck-pile, .discard-pile { position:relative; width:70px; height:100px; cursor:default; user-select:none; }
.deck-pile { background:linear-gradient(145deg,#1a2744,#2a3a5e); border:2px solid #3a4a6e; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.4); }
.deck-pile .pile-icon { font-size:28px; margin-bottom:2px; }
.deck-pile .pile-count { font-size:13px; font-weight:bold; color:#8899bb; }
.deck-pile .pile-label { font-size:9px; color:#667; }
.discard-pile { background:linear-gradient(145deg,#2a1a1a,#3a2222); border:2px dashed #4a3333; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
.discard-pile:hover { border-color:#6a4444; }
.discard-pile .pile-icon { font-size:28px; margin-bottom:2px; }
.discard-pile .pile-count { font-size:13px; font-weight:bold; color:#bb8888; }
.discard-pile .pile-label { font-size:9px; color:#666; }
.discard-pile.has-cards { cursor:pointer; }

/* Discard hover tooltip */
#discard-tooltip { display:none; position:absolute; bottom:110%; left:50%; transform:translateX(-50%); background:rgba(26,26,62,0.92); border:1px solid #444; border-radius:10px; padding:12px; min-width:220px; max-width:400px; max-height:240px; overflow-y:auto; z-index:50; box-shadow:0 4px 20px rgba(0,0,0,0.6); transition:opacity 0.3s ease, background 0.3s ease; }
#discard-tooltip.show { display:block; }
#discard-tooltip.semi-transparent { opacity:0.15; background:rgba(26,26,62,0.4); pointer-events:none; }
#discard-tooltip::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:8px solid transparent; border-top-color:#444; }
#discard-tooltip .tip-title { font-size:12px; color:#888; margin-bottom:8px; border-bottom:1px solid #333; padding-bottom:4px; }
#discard-tooltip .tip-cards { display:flex; flex-wrap:wrap; gap:6px; }
#discard-tooltip .tip-card { padding:4px 8px; border-radius:4px; font-size:12px; font-weight:bold; border:1px solid #444; }
#discard-tooltip .tip-card.red-card { background:rgba(139,0,0,0.3); color:#ff8a8a; border-color:#5a2020; }
#discard-tooltip .tip-card.black-card { background:rgba(26,26,62,0.5); color:#ccc; border-color:#333; }
#discard-tooltip .tip-empty { color:#555; font-size:12px; text-align:center; padding:12px 0; }

/* Mobile landscape adaptation */
@media (max-height: 500px) and (orientation: landscape) {
  body { font-size: 12px; }
  #game { padding: 4px 6px; max-width: 100%; }
  
  /* Top bar: single line compact */
  #top-bar { padding: 3px 8px; margin-bottom: 3px; gap: 4px; }
  #top-bar .info { font-size: 10px; }
  
  /* AI panels: horizontal compact */
  #ai-players { gap: 4px; margin-bottom: 3px; }
  .ai-panel { min-width: 0; padding: 4px 6px; border-radius: 6px; }
  .ai-panel .name { font-size: 11px; margin-bottom: 2px; gap: 3px; }
  .ai-panel .name .stars { font-size: 9px; }
  .ai-panel .chips { font-size: 10px; margin-bottom: 1px; }
  .ai-panel .hand-count { font-size: 9px; margin-bottom: 1px; }
  .ai-panel .passive { font-size: 8px; padding: 1px 4px; }
  .ai-panel .cover-cards { margin-top: 2px; gap: 2px; }
  .cover-card { width: 22px; height: 30px; font-size: 7px; }
  
  /* Public area: compact */
  #public-area { padding: 4px 6px; margin-bottom: 3px; min-height: 60px; border-radius: 6px; }
  #public-area .label { font-size: 9px; margin-bottom: 3px; }
  #public-cards { gap: 4px; }
  .pub-card { width: 38px; height: 54px; font-size: 13px; }
  .pub-card .suit { font-size: 16px; }
  .pub-card.frozen::after { font-size: 10px; top: -5px; right: -5px; }
  
  /* Pot: minimal */
  #pot-display { padding: 3px; margin-bottom: 3px; font-size: 11px; }
  #pot-display .pot-amount { font-size: 15px; }
  
  /* Deck & discard: compact */
  #deck-discard-bar { gap: 20px; margin-bottom: 3px; }
  .deck-pile, .discard-pile { width: 44px; height: 60px; }
  .deck-pile .pile-icon, .discard-pile .pile-icon { font-size: 18px; }
  .deck-pile .pile-count, .discard-pile .pile-count { font-size: 10px; }
  .deck-pile .pile-label, .discard-pile .pile-label { font-size: 7px; }
  #discard-tooltip { min-width: 140px; max-height: 160px; padding: 6px; }
  #discard-tooltip .tip-title { font-size: 9px; }
  #discard-tooltip .tip-card { font-size: 10px; padding: 2px 5px; }
  
  /* Player area: compact */
  #player-area { padding: 4px 8px; margin-bottom: 3px; border-width: 1px; }
  #player-header { margin-bottom: 3px; }
  #player-header .name { font-size: 12px; }
  #player-header .chips { font-size: 11px; }
  #player-hand { gap: 3px; min-height: 54px; padding: 3px 0; }
  .hand-card { width: 40px; height: 58px; font-size: 14px; border-width: 1px; border-radius: 4px; }
  .hand-card:hover { transform: translateY(-4px); }
  .hand-card.selected { transform: translateY(-6px); }
  
  /* Skill cards: compact */
  #skill-cards { gap: 3px; margin-top: 3px; min-height: 28px; }
  .skill-card { padding: 3px 6px; font-size: 9px; max-width: 150px; border-radius: 4px; }
  .skill-card .cost { font-size: 9px; }
  .skill-card .type-tag { font-size: 7px; }
  
  /* Action bar: compact */
  #action-bar { gap: 4px; padding: 4px; }
  .btn { padding: 5px 12px; font-size: 11px; border-radius: 4px; }
  
  /* Log: compact & scrollable */
  #log { padding: 4px 6px; max-height: 60px; font-size: 10px; line-height: 1.4; border-radius: 6px; }
  
  /* Modal: fill more of landscape screen */
  .modal { padding: 12px 16px; max-height: 85vh; width: 95%; border-radius: 8px; }
  .modal h2 { font-size: 14px; margin-bottom: 6px; }
  .modal p { font-size: 11px; margin-bottom: 6px; line-height: 1.4; }
  .modal .cards-choice { gap: 6px; margin: 6px 0; }
  .modal .choice-card { padding: 6px 8px; min-width: 90px; border-radius: 6px; }
  .modal .choice-card .card-name { font-size: 10px; margin-bottom: 2px; }
  .modal .choice-card .card-desc { font-size: 9px; }
  
  /* Passive/resonance badges: tiny */
  .passive-badge { font-size: 8px; padding: 1px 5px; }
  .resonance-badge { font-size: 8px; padding: 1px 4px; }
}

/* Portrait mode: show rotate hint overlay */
@media (max-height: 500px) and (orientation: portrait) {
  #rotate-hint {
    display: flex !important;
  }
}

#rotate-hint {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.95);
  z-index: 9999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #f0c040;
  text-align: center;
}
#rotate-hint .rotate-icon { font-size: 48px; margin-bottom: 16px; animation: rotate-pulse 2s ease-in-out infinite; }
#rotate-hint .rotate-text { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
#rotate-hint .rotate-sub { font-size: 13px; color: #888; }
@keyframes rotate-pulse {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-30deg); }
  75% { transform: rotate(30deg); }
}

/* Touch optimization: remove hover transforms on touch devices */
@media (hover: none) {
  .hand-card:hover { transform: none; }
  .hand-card.selected { transform: translateY(-6px); }
  .btn:hover { transform: none; }
  .modal .choice-card:hover { border-color: #444; }
}

/* Responsive — tablets and small laptops */
@media(max-width:768px) {
  .hand-card { width:48px; height:72px; font-size:14px; }
  .pub-card { width:44px; height:64px; font-size:13px; }
  .pub-card .suit { font-size:17px; }
  .ai-panel { min-width:140px; }
  #deck-discard-bar { gap:20px; }
  .deck-pile, .discard-pile { width:58px; height:82px; }
  .deck-pile .pile-icon, .discard-pile .pile-icon { font-size:22px; }
  #discard-tooltip { min-width:180px; }
  /* Hide rotate hint on tablets */
  #rotate-hint { display: none !important; }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#111; }
::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
</style>
</head>
<body>

<div id="rotate-hint">
  <div class="rotate-icon">📱↔</div>
  <div class="rotate-text">请横屏体验</div>
  <div class="rotate-sub">为获得最佳游戏体验，请将手机旋转至横屏模式</div>
</div>

<div id="start-screen">
  <h1>🃏 卡牌对决</h1>
  <p class="subtitle">扑克 × 自走棋 × 多人竞技 — Phase 1 Demo</p>
  <div class="features">
    <div class="feature"><div class="icon">🛡️</div><div class="title">5大流派</div><div class="desc">囤积/潮汐/秩序/枪手/掘墓</div></div>
    <div class="feature"><div class="icon">🃏</div><div class="title">52张标准牌</div><div class="desc">完整牌型判定×10种加成</div></div>
    <div class="feature"><div class="icon">⚡</div><div class="title">技能×陷阱</div><div class="desc">每流派3张核心技能卡</div></div>
    <div class="feature"><div class="icon">🤖</div><div class="title">4个AI对手</div><div class="desc">差异化策略+内心独白</div></div>
  </div>
  <button class="btn btn-primary" style="font-size:18px;padding:14px 48px" onclick="startGame()">🎮 开始游戏（R1·5人5回合）</button>
</div>

<div id="game" style="display:none">
  <div id="top-bar">
    <div class="info">轮次：<span id="round-info">R1 / 回合 1/5</span></div>

// ========== CARD UTILITIES ==========
function createDeck() {
  let deck = [];
  for (let s of SUITS) {
    for (let r of RANKS) {
      deck.push({suit:s, rank:r, id:`${s}${r}`});
    }
  }
  return shuffle(deck);
}

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function isRed(card) { return card.suit === '♥' || card.suit === '♦'; }
function cardName(card) { return `${card.suit}${RANK_NAMES[card.rank]}`; }
function cardHTML(card, extra='') { 
  return `<span class="${isRed(card)?'red':'black'}-card" ${extra}>${card.suit}${RANK_NAMES[card.rank]}</span>`; 
}

function drawFromDeck(n) {
  let cards = [];
  for (let i = 0; i < n; i++) {
    if (G.deck.length === 0) {
      let reshuffledCount = G.discardPile.length;
      G.deck = shuffle(G.discardPile);
      G.discardPile = [];
      if (G.deck.length === 0) break;
      // Show reshuffle animation
      showReshuffleEffect(reshuffledCount);
    }
    cards.push(G.deck.pop());
  }
  return cards;
}

// Draw skill cards from the skill pool (random, respecting usedSkills uniqueness)
function drawSkills(count, allowL2) {
  let available = SKILL_POOL.filter(s => !G.usedSkills.has(s.id));
  let drawn = [];
  let pool = shuffle([...available]);
  for (let i = 0; i < count && i < pool.length; i++) {
    let sk = {...pool[i]};
    if (allowL2 && i === 1 && drawn.length > 0) {
      sk.level = 2; sk.cost = 3; sk.desc = getL2Desc(sk.id) || sk.desc;
    }
    drawn.push(sk);
    G.usedSkills.add(sk.id);
  }
  return drawn;
}

function showReshuffleEffect(count) {

  if (deckEl) {

// ========== HAND EVALUATION ==========
function evaluateHand(cards) {
  if (!cards || cards.length === 0) return {rank:0, name:'无', bonus:0, kickers:[], best5:[]};
  
  // Get all combinations of 5 (or fewer if not enough)
  let combos = getCombinations(cards, Math.min(5, cards.length));
  let best = null;
  
  for (let combo of combos) {
    let result = evaluate5(combo);
    if (!best || compareHands(result, best) > 0) {
      best = result;
      best.best5 = combo;
    }
  }
  return best;
}

// ========== FOG L2: Wild suit evaluation ==========
// When a player has fog passive L2, covered cards in public pool act as wild suit.
// This function tries all possible suit assignments for covered cards to find the best hand.
const ALL_SUITS = ['♥', '♦', '♣', '♠'];

function evaluateHandWithFogWild(cards, coveredCount) {
  if (coveredCount === 0) return evaluateHand(cards);
  
  // Separate covered cards (assumed to be at the end of the array)
  let fixedCards = cards.slice(0, cards.length - coveredCount);
  let coveredCards = cards.slice(cards.length - coveredCount);
  
  let best = evaluateHand(cards); // baseline: original suits
  
  // For each covered card, try all 4 suits
  // With N covered cards, we try 4^N combinations
  // For performance, limit to 3 covered cards (4^3=64 combos)
  let maxWild = Math.min(coveredCount, 3);
  
  if (maxWild === 0) return best;
  
  // Generate all suit combinations for maxWild covered cards
  function* suitCombos(n) {
    if (n === 0) { yield []; return; }
    for (let s of ALL_SUITS) {
      for (let rest of suitCombos(n - 1)) {
        yield [s, ...rest];
      }
    }
  }
  
  for (let suitAssignment of suitCombos(maxWild)) {
    // Create modified cards with assigned suits
    let modifiedCards = [...fixedCards];
    for (let i = 0; i < maxWild; i++) {
      modifiedCards.push({...coveredCards[i], suit: suitAssignment[i]});
    }
    // Any remaining covered cards keep their original suit
    for (let i = maxWild; i < coveredCards.length; i++) {
      modifiedCards.push(coveredCards[i]);
    }
    
    let result = evaluateHand(modifiedCards);
    if (compareHands(result, best) > 0) {
      best = result;
      best.best5 = result.best5;
      best._fogUsed = true; // flag to indicate fog L2 was used
      best._fogSuits = suitAssignment; // record which suits were assigned
    }
  }
  
  return best;
}

function getCombinations(arr, k) {
  if (k === 0) return [[]];
  if (arr.length < k) return [];
  let results = [];
  for (let i = 0; i <= arr.length - k; i++) {
    let rest = getCombinations(arr.slice(i+1), k-1);
    for (let combo of rest) {
      results.push([arr[i], ...combo]);
    }
  }
  return results;
}

function evaluate5(cards) {
  if (cards.length < 5) {
    // Less than 5 cards: check for pairs, trips etc
    let rankCounts = {};
    for (let c of cards) {
      rankCounts[c.rank] = (rankCounts[c.rank] || 0) + 1;
    }
    let counts = Object.entries(rankCounts).sort((a,b) => b[1]-a[1] || b[0]-a[0]);
    let maxCount = counts[0][1];
    
    if (maxCount === 4) return {...HAND_RANKS.FOUR_OF_A_KIND, kickers: counts.map(c=>parseInt(c[0])).sort((a,b)=>b-a)};
    if (maxCount === 3 && counts.length >= 2 && counts[1][1] === 2) return {...HAND_RANKS.FULL_HOUSE, kickers: counts.map(c=>parseInt(c[0])).sort((a,b)=>b-a)};
    if (maxCount === 3) return {...HAND_RANKS.THREE_OF_A_KIND, kickers: counts.map(c=>parseInt(c[0])).sort((a,b)=>b-a)};
    if (maxCount === 2 && counts.length >= 2 && counts[1][1] === 2) return {...HAND_RANKS.TWO_PAIR, kickers: counts.map(c=>parseInt(c[0])).sort((a,b)=>b-a)};
    if (maxCount === 2) return {...HAND_RANKS.ONE_PAIR, kickers: counts.map(c=>parseInt(c[0])).sort((a,b)=>b-a)};
    return {...HAND_RANKS.HIGH_CARD, kickers: cards.map(c=>c.rank).sort((a,b)=>b-a)};
  }
  
  let ranks = cards.map(c => c.rank).sort((a,b) => a-b);
  let suits = cards.map(c => c.suit);
  
  let isFlush = suits.every(s => s === suits[0]);
  
  // Check straight
  let isStraight = false;
  let straightHigh = 0;
  let uniqueRanks = [...new Set(ranks)].sort((a,b)=>a-b);
  
  if (uniqueRanks.length === 5) {
    if (uniqueRanks[4] - uniqueRanks[0] === 4) {
      isStraight = true;
      straightHigh = uniqueRanks[4];
    }
    // Ace-low: A-2-3-4-5
    if (uniqueRanks[0]===2 && uniqueRanks[1]===3 && uniqueRanks[2]===4 && uniqueRanks[3]===5 && uniqueRanks[4]===14) {
      isStraight = true;
      straightHigh = 5;
    }
  }
  
  // Royal flush check
  if (isFlush && isStraight) {
    let sorted = [...ranks].sort((a,b)=>a-b);
    if (sorted.join(',') === '10,11,12,13,14') return {...HAND_RANKS.ROYAL_FLUSH, kickers:[14]};
    return {...HAND_RANKS.STRAIGHT_FLUSH, kickers:[straightHigh]};
  }
  
  if (isFlush) return {...HAND_RANKS.FLUSH, kickers: ranks.sort((a,b)=>b-a)};
  if (isStraight) return {...HAND_RANKS.STRAIGHT, kickers:[straightHigh]};
  
  // Count ranks
  let rankCounts = {};
  for (let c of cards) rankCounts[c.rank] = (rankCounts[c.rank]||0)+1;
  let groups = Object.entries(rankCounts).map(([r,c])=>({rank:parseInt(r),count:c})).sort((a,b)=>b.count-a.count || b.rank-a.rank);
  
  if (groups[0].count === 4) return {...HAND_RANKS.FOUR_OF_A_KIND, kickers: groups.map(g=>g.rank)};
  if (groups[0].count === 3 && groups[1].count === 2) return {...HAND_RANKS.FULL_HOUSE, kickers: groups.map(g=>g.rank)};
  if (groups[0].count === 3) return {...HAND_RANKS.THREE_OF_A_KIND, kickers: groups.map(g=>g.rank)};
  if (groups[0].count === 2 && groups[1].count === 2) return {...HAND_RANKS.TWO_PAIR, kickers: groups.map(g=>g.rank)};
  if (groups[0].count === 2) return {...HAND_RANKS.ONE_PAIR, kickers: groups.map(g=>g.rank)};
  
  return {...HAND_RANKS.HIGH_CARD, kickers: ranks.sort((a,b)=>b-a)};
}

function compareHands(a, b) {
  if (a.rank !== b.rank) return a.rank - b.rank;
  for (let i = 0; i < Math.min(a.kickers.length, b.kickers.length); i++) {
    if (a.kickers[i] !== b.kickers[i]) return a.kickers[i] - b.kickers[i];
  }
  return 0;
}

function renderPublicCards() {

  let html = '';

    let visible = true;

    if (pc.covered && pc.owner !== 0) visible = false;
    // In showdown, reveal all
    if (G.phase === 'showdown' || G.phase === 'settlement') visible = true;
    
    if (!visible) {
      html += `<div class="pub-card covered"><div class="suit">?</div><div class="rank">?</div></div>`;
    } else {
      let colorClass = isRed(pc.card) ? 'red' : 'black';
      let frozenClass = pc.frozen ? 'frozen' : '';

    `手牌 (${p.hand.length}/${p.handLimit}) — ${G.phase==='action'&&G.currentActorIdx===0 ? (p.coverCards.length > 0 ? `已盖${p.coverCards.length}张，必须加注至≥${G.coverTarget}张或Fold` : `点击选择要盖出的牌（需≥${G.coverTarget}张）`) : '等待中...'}`;
  
  let handEl = document.getElementById('player-hand');
  handEl.innerHTML = '';
  for (let card of p.hand) {
    let colorClass = isRed(card) ? 'red' : 'black';
    let div = document.createElement('div');
    div.className = `hand-card ${colorClass} ${card._selected?'selected':''}`;
    div.innerHTML = `<div class="suit" style="font-size:24px;color:${isRed(card)?'#ff6b6b':'#bbb'}">${card.suit}</div>
                     <div style="color:${isRed(card)?'#ff6b6b':'#ddd'}">${RANK_NAMES[card.rank]}</div>`;
    if (G.phase === 'action' && G.currentActorIdx === 0 && !G.waitingForInput) {
      div.onclick = () => toggleCardSelection(card);
    }
    handEl.appendChild(div);
  }
  
  // Cover cards area (show face-down during action, revealed during showdown)
  let coverArea = document.getElementById('player-cover-area');
  if (p.coverCards.length > 0) {
    coverArea.style.display = 'block';
    document.getElementById('cover-count').textContent = p.coverCards.length;
    let coverEl = document.getElementById('player-cover-cards');
    coverEl.innerHTML = '';
    for (let c of p.coverCards) {
      let colorClass = isRed(c) ? 'red' : 'black';
      let div = document.createElement('div');
      if (G.phase === 'showdown' || G.phase === 'settlement') {
        div.className = `hand-card ${colorClass}`;
        div.innerHTML = `<div class="suit" style="font-size:24px;color:${isRed(c)?'#ff6b6b':'#bbb'}">${c.suit}</div>
                         <div style="color:${isRed(c)?'#ff6b6b':'#ddd'}">${RANK_NAMES[c.rank]}</div>`;
      } else {
        div.className = 'cover-card';
        div.style.cssText = 'width:48px;height:68px;background:linear-gradient(135deg,#2c3e50,#34495e);border-radius:6px;border:1px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:20px;';
        div.innerHTML = '🎴';
      }
      coverEl.appendChild(div);
    }
  } else {
    coverArea.style.display = 'none';
  }
  
  // Skills
  document.getElementById('skill-count').textContent = p.skills.length;
  let skillEl = document.getElementById('skill-cards');
  skillEl.innerHTML = '';
  for (let sk of p.skills) {
    let div = document.createElement('div');
    div.className = `skill-card ${sk.type==='trap'?'trap':''}`;
    div.innerHTML = `<span class="type-tag">${sk.type==='trap'?'陷阱':'主动'}</span> ${sk.name} <span class="cost">${sk.type==='trap'?'触发时'+sk.cost+'💰':sk.cost+'💰'}</span><br><span style="font-size:10px;color:#aaa">${sk.desc}</span>`;
    if (G.phase === 'action' && G.currentActorIdx === 0 && !G.waitingForInput) {
      div.onclick = () => playerUseSkill(sk);
    }
    skillEl.appendChild(div);
  }
}

function renderActionBar() {
  let el = document.getElementById('action-bar');
  el.innerHTML = '';
  
  if (G.phase === 'action' && G.currentActorIdx === 0 && !G.waitingForInput) {
    let p = G.players[0];
    let hasCashOut = p.passives.some(ps => ps.id === 'cash_out') && p.hand.length > 0 && !p._cashOutUsed;
    let cashOutPassive = p.passives.find(ps => ps.id === 'cash_out');
    let cashOutGain = cashOutPassive && cashOutPassive.level >= 2 ? 5 : 3;
    let cashOutBtn = hasCashOut ? `<button class="btn btn-purple" onclick="playerCashOut()">💎 紧急变现（弃1牌→+${cashOutGain}💰）</button>` : '';
    let hasGoldTrade = p.passives.some(ps => ps.id === 'gold_trade') && !p._goldTradeUsed && p.chips >= 1;
    let goldTradePassive = p.passives.find(ps => ps.id === 'gold_trade');
    let goldTradeCost = goldTradePassive && goldTradePassive.level >= 2 ? 2 : 1;
    let goldTradeDraw = goldTradePassive && goldTradePassive.level >= 2 ? 2 : 1;
    let goldTradeBtn = hasGoldTrade ? `<button class="btn btn-info" onclick="playerGoldTrade()">💰 金权交易（付${goldTradeCost}💰→摸${goldTradeDraw}张）</button>` : '';
    let hasDarkRitual = p.passives.some(ps => ps.id === 'dark_ritual') && p.hand.length > 0 && !p._darkRitualUsed;
    let darkRitualBtn = hasDarkRitual ? `<button class="btn btn-danger" onclick="playerDarkRitual()">🔥 黑暗仪式（弃1牌→逼对手弃牌）</button>` : '';
    let selected = p.hand.filter(c => c._selected);
    let target = G.coverTarget;
    let currentCover = p.coverCards.length;
    let totalAfterCover = currentCover + selected.length;
    
    // Build context-aware label
    let coverLabel;
    if (currentCover > 0) {
      // Already covered some cards — must raise (≥target) or fold
      if (totalAfterCover >= target) {
        coverLabel = `加注 (${currentCover}张 + ${selected.length}张 → ${totalAfterCover}张)`;
      } else {
        coverLabel = `加注 (需≥${target}张，当前仅${totalAfterCover}张)`;
      }
    } else {
      coverLabel = `确认盖牌 (${selected.length}/${target}张)`;
    }
    
    let isAllIn = selected.length === p.hand.length && selected.length > 0;
    let canCover = selected.length > 0 && (isAllIn || totalAfterCover >= target);
    let canAllIn = isAllIn && currentCover === 0; // All-in = select all hand cards, first cover only
    let canCheck = !G.anyoneCovered && currentCover === 0;
    let coverBtn = `<button class="btn btn-primary" ${canCover ? '' : 'disabled'} onclick="playerCoverCards()">${coverLabel}</button>`;
    let allInBtn = (canAllIn && currentCover === 0) ? `<button class="btn btn-info" onclick="playerAllIn()">All-in（${p.hand.length}张全出）</button>` : '';
    let checkBtn = canCheck ? `<button class="btn btn-secondary" onclick="playerCheck()">✋ 过牌（不盖牌，继续）</button>` : '';
    let foldBtn = `<button class="btn btn-danger" onclick="playerFold()">${currentCover > 0 ? 'Fold（放弃已盖牌）' : 'Fold'}</button>`;
    el.innerHTML = `${cashOutBtn} ${goldTradeBtn} ${darkRitualBtn} ${coverBtn} ${allInBtn} ${checkBtn} ${foldBtn}`;
    if (currentCover === 0 && p.hand.length < target && selected.length > 0) {
      el.innerHTML += `<span style="color:#f0c040;font-size:12px;margin-left:8px">手牌不足${target}张，全出即All-in</span>`;
    } else if (currentCover > 0) {
      el.innerHTML += `<span style="color:#f0c040;font-size:12px;margin-left:8px">当前需≥${target}张，加注或Fold</span>`;
    }
  }
  
  if (G.phase === 'roundEnd' && !G.waitingForInput) {
    // Round end is handled by modal, no standalone button needed
  }
  
  if (G.gameOver) {
    el.innerHTML = `<button class="btn btn-primary" onclick="location.reload()">🔄 重新开始</button>`;
  }
}

// ========== MODAL SYSTEM ==========
function showModal(title, content, buttons=[], peekable=true) {
  let container = document.getElementById('modal-container');
  let btnsHTML = buttons.map((b,i) => `<button class="btn ${b.cls||'btn-primary'}" onclick="modalAction(${i})">${b.text}</button>`).join(' ');
  let peekOverlay = peekable ? 'peekable' : '';
  let peekModal = peekable ? 'peekable' : '';
  container.innerHTML = `<div class="modal-overlay ${peekOverlay}" ${peekable ? 'onmousemove="peekModalTrack(event)" onmouseleave="peekModalOut()"' : ''}><div class="modal fade-in ${peekModal}"><h2>${title}</h2><div class="modal-content">${content}</div><div style="display:flex;gap:8px;margin-top:16px;justify-content:center">${btnsHTML}</div></div></div>`;
  container._actions = buttons.map(b => b.action);
}

function modalAction(idx) {
  let container = document.getElementById('modal-container');
  if (container._actions && container._actions[idx]) {
    container._actions[idx]();
  }
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

// Peekable modal: track mouse position on overlay to detect enter/leave of modal panel
window.peekModalTrack = function(e) {
  let modal = document.querySelector('.modal.peekable');
  if (!modal) return;
  let rect = modal.getBoundingClientRect();
  let inside = e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom;
  let overlay = document.querySelector('.modal-overlay.peekable');
  if (!overlay) return;
  if (inside) {
    // Mouse is over the modal panel — restore
    overlay.classList.remove('peek-dim');
    modal.classList.remove('peek-dim');
  } else {
    // Mouse is on the overlay but outside the modal — go transparent
    overlay.classList.add('peek-dim');
    modal.classList.add('peek-dim');
  }
};

window.peekModalOut = function() {
  // Mouse left the entire overlay area — also go transparent
  let overlay = document.querySelector('.modal-overlay.peekable');
  if (!overlay) return;
  overlay.classList.add('peek-dim');
  let modal = overlay.querySelector('.modal.peekable');
  if (modal) modal.classList.add('peek-dim');
};

async function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  
  initState();
  
  // Create players
  let human = createPlayer('你', true);
  G.players.push(human);
  
  for (let ai of AI_PROFILES) {
    G.players.push(createPlayer(ai.name, false, ai));
  }
  
  // Create and shuffle deck
  G.deck = createDeck();
  
  addLog('🎮 游戏开始！R1·5人·5回合', 'turn-label');
  
  // Initial passive selection (3-pick-1)
  await initialPassiveSelection();
  
  // Initial hand (2 cards each)
  for (let p of G.players) {
    let cards = drawFromDeck(2);
    p.hand.push(...cards);
  }
  
  addLog('每人发2张初始手牌', 'info');
  
  renderAll();
  
  // Start first turn
  await startTurn();
}

async function initialPassiveSelection() {
  // For human player: 3-pick-1
  let pool = shuffle(PASSIVE_POOL.filter(p => !G.usedPassives.has(p.id)));
  // But need unique per player - pick 3 random unused ones
  let available = pool.slice(0, 3);
  
  await new Promise(resolve => {
    let content = '<p>选择1张初始被动卡，确定你的流派方向：</p><div class="cards-choice">';
    for (let i = 0; i < 3; i++) {
      let p = available[i];
      if (!p) continue;
      content += `<div class="choice-card" id="choice-${i}" onclick="selectInitialPassive(${i})">
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
      </div>`;
    }
    content += '</div>';
    showModal('🎴 选择初始被动卡', content, [
      {text:'确认选择', cls:'btn-primary', action:() => {
        let sel = document.querySelector('.choice-card.selected');
        if (!sel) return;
        let idx = parseInt(sel.id.split('-')[1]);
        G.players[0].passives.push(available[idx]);
        G.usedPassives.add(available[idx].id);
        G.players[0].school = available[idx].school;
        // Apply passive effect immediately
        applyPassiveInitEffect(available[idx], 0);
        addLog(`你选择了「${available[idx].name}」— 流派确定！`, 'result');
        closeModal();
        resolve();
      }}
    ]);
    window._initialResolve = resolve;
  });
  
  // AI passive selection (ensure uniqueness - pick 1 each from unused pool)
  let aiPool = PASSIVE_POOL.filter(p => !G.usedPassives.has(p.id));
  aiPool = shuffle(aiPool);
  for (let i = 1; i < G.players.length; i++) {
    if (aiPool.length > 0) {
      let chosen = aiPool.shift();
      G.players[i].passives.push(chosen);
      G.usedPassives.add(chosen.id);
      G.players[i].school = chosen.school;
      applyPassiveInitEffect(chosen, i);
      addLog(`${G.players[i].name} 选择了「${chosen.name}」`, 'action');
    }
  }
}

function applyPassiveInitEffect(passive, playerIdx) {
  let p = G.players[playerIdx];
  if (passive.id === 'expand_bag') {
    p.handLimit = 5; // 4 + 1
  }
  if (passive.id === 'tactical_pocket') {
    p.skillLimit = 4; // 3 + 1
  }
  if (passive.id === 'corpse_benefit') {
    p._corpseBenefitCount = 0; // track discards this turn
  }
}

window.selectInitialPassive = function(idx) {
  document.querySelectorAll('.choice-card').forEach(el => el.classList.remove('selected'));
  document.getElementById(`choice-${idx}`).classList.add('selected');
};

window.selectSkillDiscard = function(idx) {
  document.querySelectorAll('.choice-card').forEach(el => el.classList.remove('selected'));
  document.getElementById(`skill-discard-${idx}`).classList.add('selected');
};

window.selectFreezeCard = function(idx) {
  // Legacy: single select for skill freeze (ice card)
  document.querySelectorAll('.choice-card').forEach(el => el.classList.remove('selected'));
  document.getElementById(`freeze-${idx}`).classList.add('selected');
};

window.selectFreezeCards = function(idx, maxCount) {
  // Multi-select for passive freeze field (L2: max 2)
  let el = document.getElementById(`freeze-${idx}`);
  if (!el) return;
  let selected = document.querySelectorAll('.choice-card.selected');
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
  } else if (selected.length < maxCount) {
    el.classList.add('selected');
  }
};

async function startTurn() {
  G.foldPlayers.clear();
  G.allFoldCheck = false;
  G.skillFeeTotal = 0;
  G.trapFeeTotal = 0;
  G.totalCoverCount = 0;
  G.pot = 0;
  G.potDetail = {};
  G.coverTarget = 1; // minimum 1 card to cover
  G.lastRaiserIdx = -1;
  G.firstCoverIdx = -1;
  G.anyoneCovered = false; // S8: has anyone covered this action round?
  G.traps = []; // active trap cards on the field
  G.taxLawTriggers = {};
  G._discardCountAtTurnStart = {}; // track discard pile size per player for plague aura
  G._globalDiscardAtRoundStart = G.discardPile.length; // for corpse_benefit passive
  
  // Return all cover cards to discard pile before clearing
  for (let p of G.players) {
    for (let c of p.coverCards) G.discardPile.push(c);
    p.coverCards = [];
    p.foldThisTurn = false;
    p.checkedThisTurn = false;
    p.allInThisTurn = false;
    p.turnLog = '';
    p._cashOutUsed = false;
    p._goldTradeUsed = false;
    p._darkRitualUsed = false;
  }
  
  addLog(`\n━━━ 回合 ${G.stage<=3 ? G.turnInRound+'/'+G.maxRounds : 'DJ-'+G.djTurnInRound} ━━━`, 'turn-label');
  
  // DJ: escalate ante (previous * 1.2, rounded up)
  if (G.stage === 4 && G.djTurnInRound > 1) {
    G.ante = Math.ceil(G.ante * 1.2);
  }
  
  // DJ: announce round start per rules (Section 9 checklist)
  if (G.stage === 4) {
    let dealer = G.players[G.dealerIdx];
    addLog(`⚔️ 双人对决第${G.djTurnInRound}回合，双方底注：各${G.ante}💰（庄家：${dealer.name}）`, 'phase');
  }
  
  // DJ: passive selection every 2 turns (turns 3, 5, 7...)
  if (G.stage === 4 && G.djTurnInRound > 1 && G.djTurnInRound % 2 === 1) {
    let alive = G.players.filter(p => !p.eliminated);
    await eliminationPassiveSelection(alive);
  }
  
  // S1: Rotate dealer (clockwise to next alive player)
  let alivePlayers = G.players.map((p, i) => ({p, i})).filter(x => !x.p.eliminated);
  let aliveIdxList = alivePlayers.map(x => x.i);
  let curDealerAlivePos = aliveIdxList.indexOf(G.dealerIdx);
  if (curDealerAlivePos < 0) curDealerAlivePos = -1; // current dealer was eliminated
  let nextAlivePos = (curDealerAlivePos + 1) % aliveIdxList.length;
  G.dealerIdx = aliveIdxList[nextAlivePos];
  addLog(`S1 庄家轮换 → ${G.players[G.dealerIdx].name} 🎴`, 'phase');
  
  // S2: Ante
  let anteResult = await doAnte();
  if (anteResult === 'dj_eliminated') return; // DJ ante caused elimination, game already ended
  
  // S3: Public cards
  await doPublicCards();
  
  // S4: Draw
  await doDrawPhase();
  
  // S4.1: Passive card upgrade phase
  await upgradePassivePhase();
  
  // S5+S6+S7: Unified turn phase (passive → skills/traps freely → cover/fold to end)
  await doTurnPhase();
  
  // S8: Check results
  let nonFolded = G.players.filter((_, i) => !G.foldPlayers.has(i));
  let coveredNonFolded = nonFolded.filter(p => p.coverCards.length > 0);
  
  if (nonFolded.length === 0) {
    // Everyone folded (shouldn't happen normally since S8 check prevents this)
    addLog('所有人都Fold了，本回合无赢家', 'info');
  } else if (coveredNonFolded.length === 0 && nonFolded.length > 0) {
    // Everyone checked but no one covered - S8 already flipped a card, 
    // this shouldn't happen if the loop ran correctly
    addLog('所有人都过牌了，本回合无盖牌结算', 'info');
  } else if (coveredNonFolded.length === 1 && nonFolded.every(p => p.coverCards.length === 0 || coveredNonFolded.includes(p))) {
    // Only 1 player covered, all others folded - they win
    let winner = coveredNonFolded[0];
    if (G.stage === 4) {
      // DJ Fold: winner gets chip part (both antes + skill fees + trap fees)
      let chipPart = G.potDetail.ante + G.skillFeeTotal + G.trapFeeTotal;
      winner.chips += chipPart;
      addLog(`💰 DJ底池结算：筹码部分 = ${chipPart}💰`, 'phase');
      
      // System bonus still hurts folded player
      let foldeds = G.players.filter((p, i) => G.foldPlayers.has(i) && !p.eliminated);
      for (let folded of foldeds) {
        let sysDmg = potDetailForFoldSysDamage(folded);
        if (sysDmg > 0) {
          folded.chips -= sysDmg;
          addLog(`⚡ ${folded.name} Fold→ 系统加成伤害 -${sysDmg}💰`, 'danger');
        }
      }
      
      addLog(`其他人都Fold了！${winner.name} 赢得筹码部分 +${chipPart}💰`, 'result');
    } else {
      let totalPot = G.pot;
      winner.chips += totalPot;
      addLog(`其他人都Fold了！${winner.name} 直接赢得底池 +${totalPot}💰`, 'result');
    }
  } else {
    // S9: Showdown (2+ players covered)
    await doShowdown();
  }
  
  // End of turn: freeze field passive
  for (let i = 0; i < G.players.length; i++) {
    let p = G.players[i];
    if (p.eliminated) continue;
    let freezePassive = p.passives.find(ps => ps.id === 'freeze_field');
    if (freezePassive) {
      let freezeCount = freezePassive.level >= 2 ? 2 : 1;
      let unfrozen = G.publicCards.filter(pc => !pc.frozen);
      if (unfrozen.length > 0) {
        if (p.isHuman) {
          // Let human choose which card(s) to freeze (multi-select up to freezeCount)
          let frozen = await new Promise(resolve => {
            G.waitingForInput = true;
            let content = `<p>「永冻力场${freezePassive.level>=2?'L2':''}」— 选择最多${freezeCount}张公共牌冻结（保留至下回合）：</p><div class="cards-choice">`;
            for (let j = 0; j < unfrozen.length; j++) {
              let pc = unfrozen[j];
              let c = pc.card;
              content += `<div class="choice-card" id="freeze-${j}" onclick="selectFreezeCards(${j}, ${freezeCount})" style="position:relative">
                <div class="card-name" style="font-size:20px;color:${isRed(c)?'#ff6b6b':'#ddd'}">${c.suit} ${RANK_NAMES[c.rank]}</div>
                <div class="freeze-order" id="freeze-order-${j}" style="display:none;position:absolute;top:2px;right:4px;font-size:10px;color:#87ceeb;font-weight:bold"></div>
              </div>`;
            }
            content += '</div>';
            showModal(`❄️ 永冻力场${freezePassive.level>=2?' L2':''}`, content, [
              {text:'确认冻结', cls:'btn-primary', action:() => {
                let selected = document.querySelectorAll('.choice-card.selected');
                let indices = Array.from(selected).map(el => parseInt(el.id.split('-')[1]));
                G.waitingForInput = false;
                closeModal();
                resolve(indices);
              }},
              {text:'跳过', cls:'btn-secondary', action:() => {
                G.waitingForInput = false;
                closeModal();
                resolve([]);
              }}
            ]);
          });
          for (let fi of frozen) {
            if (fi >= 0 && fi < unfrozen.length) {
              unfrozen[fi].frozen = true;
              addLog(`你「永冻力场${freezePassive.level>=2?'L2':''}」→ 冻结${cardName(unfrozen[fi].card)}`, 'info');
            }
          }
        } else {
          // AI: freeze highest rank cards (up to freezeCount)
          let sorted = [...unfrozen].sort((a,b) => b.card.rank - a.card.rank);
          for (let k = 0; k < Math.min(freezeCount, sorted.length); k++) {
            sorted[k].frozen = true;
            addLog(`${p.name}「永冻力场${freezePassive.level>=2?'L2':''}」→ 冻结${cardName(sorted[k].card)}`, 'info');
          }
        }
      }
    }
  }
  
  // End of turn: clear public cards, return to discard
  for (let pc of G.publicCards) {
    if (!pc.frozen) {
      G.discardPile.push(pc.card);
    }
  }
  // Remove non-frozen cards
  G.publicCards = G.publicCards.filter(pc => pc.frozen);
  // Clear frozen status for next turn
  for (let pc of G.publicCards) pc.frozen = false;
  
  // End of turn: hoarder resonance penalty (L1 only: hand >= 7 → pay 3 chips)
  for (let i = 0; i < G.players.length; i++) {
    let p = G.players[i];
    if (p.eliminated) continue;
    triggerHoarderResonance(p);
  }
  
  // Clear selected state
  for (let p of G.players) {
    for (let c of p.hand) delete c._selected;
    delete p._necroResonanceBonus; // clear resonance bonus flag at turn end
  }
  
  // Corpse benefit passive: gain chips based on total discards this round
  let totalDiscarded = G.discardPile.length - (G._globalDiscardAtRoundStart || 0);
  if (totalDiscarded > 0) {
    for (let p of G.players) {
      if (p.eliminated) continue;
      let cbPassive = p.passives.find(ps => ps.id === 'corpse_benefit');
      if (cbPassive) {
        let lvl = cbPassive.level || 1;
        let threshold = lvl >= 2 ? 3 : 4;
        let gain = Math.floor(totalDiscarded / threshold);
        if (gain > 0) {
          p.chips += gain;
          addLog(`🪦 ${p.name}「尸体收益${lvl>=2?'L2':''}」→ 本回合弃${totalDiscarded}张÷${threshold}→ +${gain}💰`, 'result');
        }
      }
    }
  }
  
  // Clean up traps (discard all after showdown)
  cleanupTraps();
  
  // Check eliminations (归负淘汰: chips <= 0)
  for (let p of G.players) {
    if (!p.eliminated && p.chips <= 0) {
      p.eliminated = true;
      G.eliminatedOrder.push(p);
      addLog(`${p.name} 筹码归负，淘汰！💀`, 'danger');
    }
  }
  
  let alive = G.players.filter(p => !p.eliminated);
  
  // === 多人阶段：淘汰人数过多 → 直接进入下一轮次 ===
  // After elimination, if alive count drops to stage threshold, skip remaining turns
  if (G.stage <= 3 && alive.length <= 1) {
    G.gameOver = true;
    let winner = alive[0];
    addLog(`\n🏆 ${winner ? winner.name : '无'} 获得最终胜利！`, 'result');
    await showGameEnd(winner);
    return;
  }
  if (G.stage <= 3) {
    let targetAlive = G.stageConfig[G.stage]?.players || 5;
    if (alive.length <= targetAlive - 1) {
      // Already eliminated enough to proceed to next stage
      addLog(`⚠️ 淘汰人数达标，跳过剩余回合，直接进入${G.stageNames[G.stage+1] || 'DJ'}！`, 'phase');
      await handleStageEnd(alive);
      return;
    }
  }
  
  // === DJ归负淘汰：直接结束 ===
  if (G.stage === 4 && alive.length <= 1) {
    G.gameOver = true;
    let winner = alive[0];
    addLog(`\n🏆 ${winner ? winner.name : '无'} 获得最终胜利！`, 'result');
    await showGameEnd(winner);
    return;
  }
  
  // === 检查是否应进入DJ ===
  if (G.stage < 4 && alive.length === 2) {
    addLog(`\n━━━ 仅剩2人，进入双人对决！━━━`, 'turn-label');
    await enterDJ();
    return;
  }
  
  // === 543阶段：回合数用完 → 淘汰 + 下一阶段 ===
  if (G.stage <= 3 && G.turnInRound >= G.maxRounds) {
    await handleStageEnd(alive);
    return;
  }
  
  // === 继续当前回合 ===
  if (G.stage === 4) {
    G.djTurnInRound++;
  } else {
    G.turnInRound++;
  }
  G.phase = 'roundEnd';
  renderAll();
  
  // Show "next turn" button for human
  G.waitingForInput = true;
  let nextLabel = G.stage <= 3
    ? `下一回合 (${G.turnInRound}/${G.maxRounds}) →`
    : `DJ下一回合 (回合 ${G.djTurnInRound}) →`;
  
  // DJ: preview next round's ante
  let nextAntePreview = '';
  if (G.stage === 4) {
    let nextAnte = Math.ceil(G.ante * 1.2);
    let passiveHint = (G.djTurnInRound % 2 === 1 && G.djTurnInRound > 1) 
      ? `<p style="color:#9b59b6;font-size:12px">📌 下回合触发被动卡获取/升级</p>` 
      : '';
    nextAntePreview = `
    <div style="background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.2);border-radius:6px;padding:8px;margin:8px 0;font-size:13px">
      <p>下回合双方底注：<strong style="color:#e74c3c">各${nextAnte}💰</strong>（当前各${G.ante}💰 × 1.2）</p>
      ${passiveHint}
    </div>`;
  }
  
  await new Promise(resolve => {
    showModal(`⏳ ${G.stage <= 3 ? '回合结束' : '⚔️ DJ回合结束'}`, 
      `<p>${G.stage <= 3 ? (G.stageNames[G.stage] || 'R?') + ' 回合 ' + (G.turnInRound - 1) : 'DJ 回合 ' + (G.djTurnInRound - 1)} 结束</p>
    <table style="width:100%;border-collapse:collapse;margin:8px 0">
    <tr style="border-bottom:1px solid #333"><th style="text-align:left;padding:4px">玩家</th><th style="padding:4px">筹码</th><th style="padding:4px">状态</th></tr>
    ${G.players.filter(p=>!p.eliminated||G.stage===4).map(p => `<tr style="border-bottom:1px solid #222"><td style="padding:4px">${p.name}</td><td style="text-align:center;color:#f0c040">${p.chips}💰</td><td style="text-align:center">${p.eliminated?'💀淘汰':'✅存活'}</td></tr>`).join('')}
    </table>
    ${nextAntePreview}`, [
      {text: nextLabel, cls:'btn-primary', action:()=>{closeModal();G.waitingForInput=false;resolve();}}
    ]);
  });
  
  await startTurn();
}

// ========== STAGE TRANSITIONS ==========

async function handleStageEnd(alive) {
  G.phase = 'elimination';
  let stageLabel = G.stageNames[G.stage] || 'R?';
  addLog(`\n━━━ ${stageLabel} 结束 ━━━`, 'turn-label');
  
  // Find player with lowest chips among alive
  let minChips = Math.min(...alive.map(p => p.chips));
  let eliminated = alive.filter(p => p.chips === minChips);
  
  let eliminatedPlayer = null;
  
  if (eliminated.length === 1) {
    eliminatedPlayer = eliminated[0];
    eliminatedPlayer.eliminated = true;
    G.eliminatedOrder.push(eliminatedPlayer);
    addLog(`📉 ${eliminatedPlayer.name} 筹码最少(${minChips}💰)，被淘汰！`, 'danger');
  } else {
    // Tie - play a tiebreaker round
    addLog(`多名玩家并列最少(${minChips}💰)，加赛！`, 'info');
    await showStageSummary(stageLabel, eliminatedPlayer);
    // Simple tiebreaker: random among tied
    eliminatedPlayer = eliminated[Math.floor(Math.random() * eliminated.length)];
    eliminatedPlayer.eliminated = true;
    G.eliminatedOrder.push(eliminatedPlayer);
    addLog(`加赛结果：${eliminatedPlayer.name} 被淘汰！💀`, 'danger');
  }
  
  // Return eliminated player's passives to pool
  for (let ps of eliminatedPlayer.passives) {
    G.usedPassives.delete(ps.id);
  }
  
  // Show summary
  await showStageSummary(stageLabel, eliminatedPlayer);
  
  // Check if we should enter DJ or next stage
  alive = G.players.filter(p => !p.eliminated);
  
  if (alive.length === 2) {
    addLog(`\n━━━ 仅剩2人，进入双人对决！━━━`, 'turn-label');
    await enterDJ();
    return;
  }
  
  if (alive.length <= 1) {
    G.gameOver = true;
    let winner = alive[0];
    addLog(`\n🏆 ${winner ? winner.name : '无'} 获得最终胜利！`, 'result');
    await showGameEnd(winner);
    return;
  }
  
  // Move to next stage
  G.stage++;
  let config = G.stageConfig[G.stage];
  if (config) {
    G.maxRounds = config.rounds;
    G.ante = config.ante;
    G.turnInRound = 1;
    G.round = 1;
    addLog(`\n━━━ ${G.stageNames[G.stage]}开始！${alive.length}人·${G.maxRounds}回合·底注${G.ante}💰 ━━━`, 'turn-label');
  }
  
  // === 淘汰回合被动卡选择 ===
  await eliminationPassiveSelection(alive);
  
  // Return all cover cards and remaining hands to discard pile before resetting
  for (let p of G.players) {
    for (let c of p.coverCards) G.discardPile.push(c);
    for (let c of p.hand) G.discardPile.push(c);
    for (let c of G.publicCards) G.discardPile.push(c.card);
  }
  
  // Recycle: return all cards to new deck and reset discard pile
  let recycledCount = G.discardPile.length;
  G.discardPile = [];
  G.skillDiscardPile = [];
  G.usedSkills.clear();
  G.destroyedCards = 0; // reset destroyed counter at stage transition
  G.deck = createDeck();
  if (recycledCount > 0) {
    addLog(`弃牌堆${recycledCount}张牌回收，新建牌库，销毁计数清零`, 'info');
  }
  
  // Clear hands and re-deal
  for (let p of alive) {
    // Return skills to skill discard pile before clearing
    for (let s of p.skills) {
      G.skillDiscardPile.push(s);
      G.usedSkills.delete(s.id);
    }
    p.hand = [];
    p.coverCards = [];
    p.skills = [];
    let cards = drawFromDeck(2);
    p.hand.push(...cards);
  }
  G.publicCards = [];
  
  addLog('手牌重发，弃牌堆洗回', 'info');
  renderAll();
  
  await startTurn();
}

async function showStageSummary(stageLabel, eliminatedPlayer) {
  return new Promise(resolve => {
    G.waitingForInput = true;
    let summary = `<p>${stageLabel} 结算：</p><table style="width:100%;border-collapse:collapse;margin:8px 0">`;
    summary += '<tr style="border-bottom:1px solid #333"><th style="text-align:left;padding:4px">排名</th><th style="text-align:left;padding:4px">玩家</th><th style="padding:4px">筹码</th><th style="padding:4px">状态</th></tr>';

    let sorted = [...G.players].sort((a,b) => b.chips - a.chips);
    sorted.forEach((p, i) => {

    showModal(`📊 ${stageLabel} 结算`, summary, [

}

// ========== ELIMINATION PASSIVE SELECTION ==========

async function eliminationPassiveSelection(alive) {
  G.phase = 'passiveSelect';
  // Available passives: not held by any alive player
  let available = G.passivePool.filter(p => !G.usedPassives.has(p.id));
  
  // Draw alive.length+1 cards (or fewer if not enough)
  let drawCount = Math.min(alive.length + 1, available.length);
  if (drawCount === 0) {
    addLog('被动卡库已空，跳过被动卡选择', 'info');
    return;
  }
  let drawn = shuffle(available).slice(0, drawCount);
  
  // Sort alive by chips ascending (poorest first)
  let sorted = [...alive].sort((a, b) => a.chips - b.chips);
  
  for (let pi = 0; pi < sorted.length; pi++) {
    let p = sorted[pi];
    let choices = drawn.slice(0, 3); // show up to 3
    if (choices.length === 0) break;
    
    if (p.isHuman) {
      await humanPassiveChoice(p, choices);
    } else {
      // AI: pick the best passive for their school, or first available
      await aiPassiveChoice(p, choices);
    }
  }
}

    for (let i = 0; i < choices.length; i++) {

    }
    content += '</div>';
    showModal('🎴 被动卡选择', content, [
      {text:'跳过 (+4💰)', cls:'btn-secondary', action:() => {
        player.chips += 4;
        addLog(`${player.name} 跳过被动卡选择，+4💰`, 'action');

                  document.querySelector('.choice-card.selected');

        let chosen = choices[idx];
        
        // If passive slots full, ask to replace (human chooses which to discard)
        if (player.passives.length >= player.passiveLimit) {
          // Open replace dialog
          closeModal();
          let replaceContent = '<p>被动卡槽已满，选择要替换的被动卡：</p><div class="cards-choice">';
          for (let j = 0; j < player.passives.length; j++) {
            let ps = player.passives[j];
            replaceContent += `<div class="choice-card passive-replace-${j}" id="ps-replace-${j}" onclick="selectPassiveReplace(${j})">
              <div class="card-name">${ps.name}</div>
              <div class="card-desc">${ps.desc}</div>
            </div>`;
          }
          replaceContent += '</div>';
          showModal('🔄 替换被动卡', replaceContent, [
            {text:'取消', cls:'btn-secondary', action:() => {
              closeModal(); G.waitingForInput = false; resolve();
            }},
            {text:'确认替换', cls:'btn-primary', action:() => {
              let repSel = document.querySelector('[class*="passive-replace-"].selected');
              if (!repSel) { addLog('请选择要替换的被动卡', 'danger'); return; }
              let repIdx = parseInt(repSel.id.split('-').pop());
              let replaced = player.passives.splice(repIdx, 1)[0];
              G.usedPassives.delete(replaced.id);
              addLog(`替换「${replaced.name}」→「${chosen.name}」`, 'action');
              player.passives.push(chosen);
              G.usedPassives.add(chosen.id);
              if (!player.school) player.school = chosen.school;
              applyPassiveInitEffect(chosen, G.players.indexOf(player));
              checkResonance(G.players.indexOf(player)); // Check resonance after gaining passive
              closeModal(); G.waitingForInput = false; resolve();
            }}
          ]);
          return;
        } else {
          addLog(`获得被动卡「${chosen.name}」`, 'action');
        }
        
        player.passives.push(chosen);
        G.usedPassives.add(chosen.id);
        if (!player.school) player.school = chosen.school;
        applyPassiveInitEffect(chosen, G.players.indexOf(player));
        checkResonance(G.players.indexOf(player)); // Check resonance after gaining passive
        closeModal();G.waitingForInput=false;resolve();
      }}
    ]);
  });
}

};

window.selectPassiveReplace = function(idx) {
  document.querySelectorAll('[class*="passive-replace-"]').forEach(el => el.classList.remove('selected'));

async function aiPassiveChoice(player, choices) {
  // AI strategy: prefer own school > hoarder economy > any
  let best = choices[0];
  let bestScore = -1;
  for (let c of choices) {
    let score = 0;
    if (c.school === player.school) score += 10;
    if (c.id === 'expand_bag' || c.id === 'treasury') score += 5; // economy
    if (c.id === 'tax_law') score += 3;
    if (player.chips < 10 && (c.id === 'cash_out')) score += 4;
    if (score > bestScore) { bestScore = score; best = c; }
  }
  
  // AI skips if passive is weak and they need chips
  if (bestScore < 2 && player.chips < 8) {
    player.chips += 4;
    addLog(`${player.name} 跳过被动卡选择，+4💰`, 'action');
    return;
  }
  
  if (player.passives.length >= player.passiveLimit) {
    let replaced = player.passives.shift();
    G.usedPassives.delete(replaced.id);
    addLog(`${player.name} 替换「${replaced.name}」→「${best.name}」`, 'action');
  } else {
    addLog(`${player.name} 获得「${best.name}」`, 'action');
  }
  
  player.passives.push(best);
  G.usedPassives.add(best.id);
  if (!player.school) player.school = best.school;
  applyPassiveInitEffect(best, G.players.indexOf(player));
  checkResonance(G.players.indexOf(player)); // Check resonance after gaining passive
  
  renderAll();
  await delay(600);
}
