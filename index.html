<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./demo.html">
  <title>卡牌对决</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top center, rgba(88,166,255,0.12), transparent 30%),
        radial-gradient(circle at bottom center, rgba(240,192,64,0.08), transparent 26%),
        #0c0f17;
      color: #eef4ff;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .launch-card {
      width: min(520px, calc(100vw - 32px));
      padding: 28px 26px;
      border-radius: 20px;
      border: 1px solid rgba(88,166,255,0.22);
      background: linear-gradient(180deg, rgba(23,28,44,0.96), rgba(16,18,28,0.99));
      box-shadow: 0 24px 60px rgba(0,0,0,0.32);
      text-align: center;
    }
    .kicker {
      color: #9cc7ff;
      font-size: 12px;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0 0 10px;
      color: #f0c040;
      font-size: 34px;
      line-height: 1.08;
      text-shadow: 0 0 24px rgba(240,192,64,0.25);
    }
    p {
      margin: 0;
      color: #aeb9cb;
    }
    a {
      color: #8cc7ff;
      font-weight: 700;
    }
  </style>
  <script>
    window.location.replace('./demo.html');
  </script>
</head>
<body>
  <main class="launch-card">
    <div class="kicker">CARD GAME DEMO</div>
    <h1>正在进入卡牌对决</h1>
    <p>如果没有自动跳转，请点击 <a href="./demo.html">这里进入游戏</a>。</p>
  </main>
</body>
</html>
